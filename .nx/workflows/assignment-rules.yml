# Nx Cloud assignment rules — manual DTE on GitHub-hosted runners.
#
# Single agent class today (linux-medium = ubuntu-latest, 4 vCPU). Add
# a second class with `agent: linux-large` here when a larger
# GitHub-hosted runner label is wired into ci.yml.

assignment-rules:
  # Lint and typecheck are CPU-light; pack them densely.
  - targets: [lint, typecheck]
    run-on:
      - agent: linux-medium
        parallelism: 3

  # @moltnet/rest-api atomizes its 33 vitest files into per-file tasks
  # (test-ci--__tests__/<file>.test.ts). Each per-file task is small
  # enough that we can let the agent run 2 in parallel — RPC pressure
  # is bounded per-task, not compounded across files.
  - targets: ['test-ci--*']
    projects: ['@moltnet/rest-api']
    run-on:
      - agent: linux-medium
        parallelism: 2

  # Per-file atomized tasks for any other vitest project. Cap at 1 per
  # agent: smaller suites don't benefit from multi-task parallelism on
  # the same agent, and we want to avoid RPC saturation.
  - targets: ['test-ci--*']
    run-on:
      - agent: linux-medium
        parallelism: 1

  # test/build cap at 1 per agent — vitest worker IPC starts to time
  # out under contention on 4-vCPU runners when multiple suites
  # compound their fork pools.
  - targets: [test, build]
    run-on:
      - agent: linux-medium
        parallelism: 1
