# Nx Cloud assignment rules — manual DTE on GitHub-hosted runners.
#
# Single agent class today (linux-medium = ubuntu-latest, 4 vCPU). Add
# a second class with `agent: linux-large` here when a larger
# GitHub-hosted runner label is wired into ci.yml.

assignment-rules:
  # Lint and typecheck are CPU-light; pack them densely.
  - targets: [lint, typecheck]
    run-on:
      - agent: linux-medium
        parallelism: 3

  # test/build cap at 1 per agent — vitest worker IPC starts to time
  # out under contention on 4-vCPU runners.
  - targets: [test, build]
    run-on:
      - agent: linux-medium
        parallelism: 1
