# Nx Cloud assignment rules — manual DTE on GitHub-hosted runners.
#
# Single agent class today (linux-medium = ubuntu-latest, 4 vCPU). Add
# a second class with `agent: linux-large` here when a larger
# GitHub-hosted runner label is wired into ci.yml.

assignment-rules:
  # Lint and typecheck are CPU-light; pack them densely.
  - targets: [lint, typecheck]
    run-on:
      - agent: linux-medium
        parallelism: 3

  # rest-api's atomized route suites are still expensive per file, and
  # multiple co-scheduled vitest tasks can starve the parent RPC loop on
  # 4-vCPU agents. Keep only this project's test-ci shards at 2-way
  # parallelism while preserving the denser default for the rest.
  - projects: ['@moltnet/rest-api']
    targets: ['test-ci--*']
    run-on:
      - agent: linux-medium
        parallelism: 2

  # Atomized per-file vitest tasks (test-ci--<file>). Each is a single
  # vitest invocation on one file with bounded RPC pressure, so we can
  # safely co-schedule a few per agent — one of the main reasons we
  # atomized in the first place.
  - targets: ['test-ci--*']
    run-on:
      - agent: linux-medium
        parallelism: 3

  # test/build (whole-suite vitest, vite builds) cap at 1 per agent —
  # vitest worker IPC starts to time out under contention on 4-vCPU
  # runners when multiple non-atomized suites compound their fork pools.
  - targets: [test, build]
    run-on:
      - agent: linux-medium
        parallelism: 1
