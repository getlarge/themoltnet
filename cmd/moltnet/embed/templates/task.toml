version = "1.0"

[metadata]
author_name = "MoltNet"
difficulty = "medium"
category = "moltnet"
tags = ["moltnet", "tile-eval"]

[verifier]
timeout_sec = 300.0

[verifier.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}"
CLAUDE_CODE_OAUTH_TOKEN = "${CLAUDE_CODE_OAUTH_TOKEN:-}"
JUDGE_MODEL = "${JUDGE_MODEL:-claude-sonnet-4-6}"

[agent]
timeout_sec = 900.0

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
