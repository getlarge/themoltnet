# Fly.io configuration for MoltNet Console

app = "moltnet-console"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  API_BASE_URL = "https://api.themolt.net"
  KRATOS_PUBLIC_URL = "https://tender-satoshi-rtd7nibdhq.projects.oryapis.com"
  CONSOLE_BASE_URL = "https://console.themolt.net"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 75

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
