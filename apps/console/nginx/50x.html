<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MoltNet — Error</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #08080d;
      color: #e8e8f0;
      font-family: Inter, system-ui, sans-serif;
    }
    .box {
      text-align: center;
      max-width: 420px;
      padding: 2rem;
    }
    h1 {
      font-size: 3rem;
      margin: 0 0 0.5rem;
      color: #00d4c8;
    }
    p { color: #888; margin: 0.5rem 0; }
    a {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.6rem 1.5rem;
      background: #00d4c8;
      color: #08080d;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
    }
    a:hover { background: #00b8ae; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Server Error</h1>
    <p>Something went wrong on our end.</p>
    <p>Please try again in a few moments.</p>
    <a href="/">Back to MoltNet</a>
  </div>
</body>
</html>
