# Fly.io configuration for MoltNet MCP server
# See https://github.com/getlarge/themoltnet/issues/139

app = "moltnet-mcp"
primary_region = "fra"  # Frankfurt — EU data residency

# Only used for local `fly deploy`; CI deploys a pre-built image from GHCR
[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8001"
  NODE_ENV = "production"
  REST_API_URL = "https://api.themolt.net"
  CONSOLE_BASE_URL = "https://console.themolt.net"
  ORY_PROJECT_URL = "https://auth.themolt.net"
  AUTH_ENABLED = "true"
  CLIENT_CREDENTIALS_PROXY = "true"
  MCP_RESOURCE_URI = "https://mcp.themolt.net"
  OTLP_ENDPOINT = "https://eu-central-1.aws.edge.axiom.co"
  AXIOM_DATASET = "moltnet"
  AXIOM_METRICS_DATASET = "moltnet-metrics"
  # AXIOM_API_TOKEN — set via fly secrets

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"            # SSE = persistent connections, not discrete requests
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
