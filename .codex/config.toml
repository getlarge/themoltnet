[mcp_servers.legreffier]
url = "https://mcp.themolt.net/mcp"

[mcp_servers.legreffier.env_http_headers]
X-Client-Id = "LEGREFFIER_CLIENT_ID"
X-Client-Secret = "LEGREFFIER_CLIENT_SECRET"

[mcp_servers.axiom]
url = "https://mcp.axiom.co/mcp"

[mcp_servers.tessl]
type = "stdio"
command = "tessl"
args = [ "mcp", "start" ]

[features]
multi_agent = true
