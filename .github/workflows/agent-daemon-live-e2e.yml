name: Agent Daemon Live E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

concurrency:
  group: agent-daemon-live-e2e
  cancel-in-progress: false

jobs:
  live:
    uses: ./.github/workflows/_e2e-compose.yml
    with:
      suite-name: Agent Daemon Live
      suite-slug: agent-daemon-live
      timeout-minutes: 60
      live-llm: true
      run-command: |
        if [ "$MOLTNET_AGENT_DAEMON_LIVE_LLM_E2E" = "1" ]; then
          pnpm exec nx run @themoltnet/agent-daemon:e2e --skipNxCache
        else
          pnpm exec nx run @themoltnet/agent-daemon:e2e
        fi
    secrets: inherit
