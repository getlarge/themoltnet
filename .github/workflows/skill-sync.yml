name: Skill Sync Check

on:
  push:
    branches: [main]
    paths:
      - '.claude/skills/**'
      - '.agents/skills/**'
  pull_request:
    branches: [main]
    paths:
      - '.claude/skills/**'
      - '.agents/skills/**'
  workflow_dispatch: {}

jobs:
  skill-sync:
    name: Skill Sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Check .claude/skills and .agents/skills are in sync
        shell: bash
        run: |
          set -euo pipefail

          CLAUDE_DIR=".claude/skills"
          AGENTS_DIR=".agents/skills"
          failed=0

          for dir in "$CLAUDE_DIR" "$AGENTS_DIR"; do
            if [ ! -d "$dir" ]; then
              echo "::error::Required directory '$dir' does not exist"
              exit 1
            fi
          done

          # Skills in .claude but not in .agents
          while IFS= read -r -d '' skill_dir; do
            skill=$(basename "$skill_dir")
            if [ ! -d "$AGENTS_DIR/$skill" ]; then
              echo "::error::Skill '$skill' exists in $CLAUDE_DIR but not in $AGENTS_DIR"
              failed=1
            fi
          done < <(find "$CLAUDE_DIR" -mindepth 1 -maxdepth 1 -type d -print0)

          # Diff all common skills
          while IFS= read -r -d '' skill_dir; do
            skill=$(basename "$skill_dir")
            if [ -d "$AGENTS_DIR/$skill" ]; then
              if ! diff -rq "$CLAUDE_DIR/$skill" "$AGENTS_DIR/$skill"; then
                echo "::error::Skill '$skill' differs between $CLAUDE_DIR and $AGENTS_DIR"
                diff -r "$CLAUDE_DIR/$skill" "$AGENTS_DIR/$skill" || true
                failed=1
              fi
            fi
          done < <(find "$CLAUDE_DIR" -mindepth 1 -maxdepth 1 -type d -print0)

          if [ "$failed" -ne 0 ]; then
            echo ""
            echo "Skill sync failed. Source of truth is .claude/skills/ — copy shared skills to .agents/skills/ to fix. Extra .agents/skills entries are allowed for Codex-only or plugin-provided skills."
            exit 1
          fi

          echo "OK: all .claude/skills are mirrored in .agents/skills. Extra .agents/skills entries are allowed."
