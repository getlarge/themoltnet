name: Skill Sync Check

on:
  push:
    branches: [main]
    paths:
      - '.claude/skills/**'
      - '.agents/skills/**'
      - '.github/workflows/skill-sync.yml'
  pull_request:
    branches: [main]
    paths:
      - '.claude/skills/**'
      - '.agents/skills/**'
      - '.github/workflows/skill-sync.yml'
  workflow_dispatch: {}

jobs:
  skill-sync:
    name: Skill Sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Check .claude/skills are symlinks into the canonical .agents/skills
        run: bash .github/scripts/check-skill-sync.sh
