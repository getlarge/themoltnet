name: LeGreffier Complexity Review

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [ready_for_review]

permissions: {}

jobs:
  complexity-review:
    if: |
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@legreffier /complexity-review') &&
        !endsWith(github.event.comment.user.login, '[bot]')) ||
      (github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: legreffier
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MOLTNET_AGENT_NAME: ${{ vars.MOLTNET_AGENT_NAME }}
      MOLTNET_IDENTITY_ID: ${{ secrets.MOLTNET_IDENTITY_ID }}
      MOLTNET_CLIENT_ID: ${{ secrets.MOLTNET_CLIENT_ID }}
      MOLTNET_CLIENT_SECRET: ${{ secrets.MOLTNET_CLIENT_SECRET }}
      MOLTNET_PUBLIC_KEY: ${{ secrets.MOLTNET_PUBLIC_KEY }}
      MOLTNET_PRIVATE_KEY: ${{ secrets.MOLTNET_PRIVATE_KEY }}
      MOLTNET_FINGERPRINT: ${{ secrets.MOLTNET_FINGERPRINT }}
      MOLTNET_TEAM_ID: ${{ vars.MOLTNET_TEAM_ID }}
      MOLTNET_DIARY_ID: ${{ vars.MOLTNET_DIARY_ID }}
      MOLTNET_API_URL: ${{ vars.MOLTNET_API_URL }}
      MOLTNET_AGENT_PROVIDER: ${{ vars.MOLTNET_AGENT_PROVIDER }}
      MOLTNET_AGENT_MODEL: ${{ vars.MOLTNET_AGENT_MODEL }}
      MOLTNET_GITHUB_APP_ID: ${{ vars.MOLTNET_GITHUB_APP_ID }}
      MOLTNET_GITHUB_APP_INSTALLATION_ID: ${{ vars.MOLTNET_GITHUB_APP_INSTALLATION_ID }}
      MOLTNET_GITHUB_APP_SLUG: ${{ vars.MOLTNET_GITHUB_APP_SLUG }}
      MOLTNET_GITHUB_APP_PRIVATE_KEY: ${{ secrets.MOLTNET_GITHUB_APP_PRIVATE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      PI_AUTH_JSON: ${{ secrets.PI_AUTH_JSON }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install gondolin dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends qemu-utils qemu-system-x86

      - name: Materialize MoltNet agent dir from env
        run: |
          set -euo pipefail
          npx -y @themoltnet/cli config init-from-env \
            --dir "$GITHUB_WORKSPACE" \
            --agent "$MOLTNET_AGENT_NAME"
          AGENT_DIR="$GITHUB_WORKSPACE/.moltnet/$MOLTNET_AGENT_NAME"
          {
            echo "GIT_CONFIG_GLOBAL=$AGENT_DIR/gitconfig"
            echo "MOLTNET_AGENT_DIR=$AGENT_DIR"
            echo "MOLTNET_AGENT_NAME=$MOLTNET_AGENT_NAME"
          } >> "$GITHUB_ENV"

      - name: Materialize Pi auth.json
        run: |
          set -euo pipefail
          if [ -n "${PI_AUTH_JSON:-}" ]; then
            PI_AGENT_DIR="$RUNNER_TEMP/.pi/agent"
            mkdir -p "$PI_AGENT_DIR"
            printf '%s' "$PI_AUTH_JSON" > "$PI_AGENT_DIR/auth.json"
            chmod 600 "$PI_AGENT_DIR/auth.json"
            echo "PI_CODING_AGENT_DIR=$PI_AGENT_DIR" >> "$GITHUB_ENV"
            echo "::notice::Pi auth.json materialized at $PI_AGENT_DIR/auth.json (PI_CODING_AGENT_DIR=$PI_AGENT_DIR)"

            if command -v jq >/dev/null 2>&1; then
              now_ms=$(($(date +%s) * 1000))
              grace_ms=$(( 30 * 86400 * 1000 ))
              min_expires=$(jq -r '
                [.[] | select(type == "object" and .expires != null) | .expires]
                | if length == 0 then empty else min end
              ' "$PI_AGENT_DIR/auth.json" 2>/dev/null || true)
              if [ -n "${min_expires:-}" ] && [ "$min_expires" -gt 0 ] 2>/dev/null; then
                if [ "$min_expires" -lt $(( now_ms - grace_ms )) ]; then
                  days_past=$(( (now_ms - min_expires) / 86400000 ))
                  echo "::error::PI_AUTH_JSON access token expired ${days_past} days ago — Pi's refresh window has almost certainly elapsed. Re-run \`pi /login\` and re-upload the secret. See https://developers.openai.com/codex/auth/ci-cd-auth#what-to-do-when-refresh-stops-working"
                elif [ "$min_expires" -lt "$now_ms" ]; then
                  hours_past=$(( (now_ms - min_expires) / 3600000 ))
                  echo "::warning::PI_AUTH_JSON access token expired ${hours_past}h ago. Pi will try to refresh, but if you see a 401, re-run \`pi /login\` and re-upload the secret."
                fi
              fi
            fi
          else
            echo "::notice::PI_AUTH_JSON not set; Pi will use env-var providers"
          fi

      - name: Compute gondolin snapshot cache key
        if: runner.os == 'Linux'
        id: gondolin-cache-key
        run: |
          echo "value=${{ runner.os }}-${{ runner.arch }}-gondolin-snapshot-v1-${{ hashFiles('apps/agent-daemon/package.json', 'libs/pi-extension/src/snapshot.ts', 'libs/pi-extension/src/vm-manager.ts', 'pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"

      - name: Restore gondolin snapshot cache
        if: runner.os == 'Linux'
        id: restore-gondolin-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/moltnet/gondolin
          key: ${{ steps.gondolin-cache-key.outputs.value }}

      - name: Create pr_review task
        id: create
        env:
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.issue.number }}
        run: |
          set -euo pipefail
          task_json_path="$RUNNER_TEMP/pr-review-task.json"
          node --import tsx tools/src/tasks/create-pr-review.ts \
            --pr "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            > "$task_json_path"
          cat "$task_json_path"
          task_id=$(jq -r '.id // empty' "$task_json_path")
          correlation_id=$(jq -r '.correlationId // empty' "$task_json_path")
          if [ -z "$task_id" ]; then
            echo "::error::task:create-pr-review returned no task id"
            exit 1
          fi
          echo "task_id=$task_id" >> "$GITHUB_OUTPUT"
          echo "correlation_id=$correlation_id" >> "$GITHUB_OUTPUT"

      - name: Run LeGreffier once
        env:
          TASK_ID: ${{ steps.create.outputs.task_id }}
        run: |
          set -euo pipefail
          if [ -z "$TASK_ID" ]; then
            echo "::error::TASK_ID is required"
            exit 1
          fi
          PROVIDER="${MOLTNET_AGENT_PROVIDER:-}"
          MODEL="${MOLTNET_AGENT_MODEL:-}"
          if [ -z "$PROVIDER" ]; then
            echo "::error::MOLTNET_AGENT_PROVIDER is required" >&2
            exit 1
          fi
          if [ -z "$MODEL" ]; then
            echo "::error::MOLTNET_AGENT_MODEL is required" >&2
            exit 1
          fi
          PI_AGENT_DIR="${PI_CODING_AGENT_DIR:-$RUNNER_TEMP/.pi/agent}"
          if [ "$PROVIDER" = "ollama" ]; then
            if [ -z "${OLLAMA_API_KEY:-}" ]; then
              echo "::error::OLLAMA_API_KEY is required when provider is ollama" >&2
              exit 1
            fi
            export PI_CODING_AGENT_DIR="$PI_AGENT_DIR"
            mkdir -p "$PI_AGENT_DIR"
            PI_MODELS_PATH="$PI_AGENT_DIR/models.json"
            cat > "$PI_MODELS_PATH" <<'JSON'
            {
              "providers": {
                "ollama": {
                  "baseUrl": "https://ollama.com/v1",
                  "api": "openai-completions",
                  "apiKey": "OLLAMA_API_KEY",
                  "models": [
                    {
                      "id": "qwen3.5:cloud"
                    },
                    {
                      "id": "qwen3-coder:480b-cloud"
                    }
                  ]
                }
              }
            }
            JSON
            chmod 600 "$PI_MODELS_PATH"
            echo "::notice::Pi models.json materialized at $PI_MODELS_PATH for ollama"
            PI_SETTINGS_PATH="$PI_AGENT_DIR/settings.json"
            cat > "$PI_SETTINGS_PATH" <<'JSON'
            {
              "enabledModels": [
                "ollama-cloud/qwen3.5:cloud",
                "ollama-cloud/qwen3-coder:480b-cloud"
              ]
            }
            JSON
            chmod 600 "$PI_SETTINGS_PATH"
            echo "::notice::Pi settings.json materialized at $PI_SETTINGS_PATH for ollama"
          fi
          npx -y @themoltnet/agent-daemon \
            once --task-id "$TASK_ID" \
            --agent "$MOLTNET_AGENT_NAME" \
            --provider "$PROVIDER" \
            --model "$MODEL"

      - name: Save gondolin snapshot cache
        if: |
          always()
          && runner.os == 'Linux'
          && steps.restore-gondolin-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/moltnet/gondolin
          key: ${{ steps.gondolin-cache-key.outputs.value }}
