name: Deploy Ory Network

on:
  workflow_run:
    workflows: [Deploy API]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ory
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Ory Config
    runs-on: ubuntu-latest
    environment: production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0

      - name: Install Ory CLI
        run: bash <(curl -s https://raw.githubusercontent.com/ory/meta/master/install.sh) -d -b /usr/local/bin ory

      - name: Deploy to Ory Network
        env:
          DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}
          ORY_PROJECT_ID: ${{ secrets.ORY_PROJECT_ID }}
          ORY_WORKSPACE_API_KEY: ${{ secrets.ORY_WORKSPACE_API_KEY }}
          SELFSERVICE_OIDC_GITHUB_CLIENT_ID: ${{ secrets.SELFSERVICE_OIDC_GITHUB_CLIENT_ID }}
          SELFSERVICE_OIDC_GITHUB_CLIENT_SECRET: ${{ secrets.SELFSERVICE_OIDC_GITHUB_CLIENT_SECRET }}
          SMTP_CONNECTION_URI: ${{ secrets.SMTP_CONNECTION_URI }}
          SMTP_FROM_ADDRESS: ${{ secrets.SMTP_FROM_ADDRESS }}
        run: npx @dotenvx/dotenvx run -f env.public -f .env -- ./infra/ory/deploy.sh --apply
