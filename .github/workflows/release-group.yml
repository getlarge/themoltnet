name: Release Group

on:
  workflow_call:
    inputs:
      checkout-ref:
        required: true
        type: string
      groups:
        required: true
        type: string
      dry-run:
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  packages: write

env:
  NX_LOAD_DOT_ENV_FILES: 'false'

jobs:
  release:
    name: Release ${{ inputs.groups }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout-ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: actions/setup-go@v6
        with:
          go-version-file: apps/moltnet-cli/go.mod
          cache: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ !inputs.dry-run && contains(inputs.groups, 'docker-images') }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - name: Run Nx release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_ACCESS: public
          NPM_CONFIG_PROVENANCE: 'true'
          GOPROXY: https://proxy.golang.org,direct
          GONOSUMDB: github.com/getlarge/themoltnet
        run: |
          set -euo pipefail

          GROUPS='${{ inputs.groups }}'
          if [ '${{ inputs.dry-run }}' = 'true' ]; then
            pnpm exec nx release --groups "$GROUPS" --dry-run --verbose --skip-publish
            exit 0
          fi

          BEFORE_RELEASE="$(git rev-parse HEAD)"
          pnpm exec nx release --groups "$GROUPS" --verbose --skip-publish
          AFTER_RELEASE="$(git rev-parse HEAD)"

          if [ "$AFTER_RELEASE" = "$BEFORE_RELEASE" ]; then
            echo "No release commit was created for groups: $GROUPS"
            exit 0
          fi

          git push origin HEAD:main --follow-tags --no-verify --atomic
          pnpm exec nx release publish --groups "$GROUPS" --verbose
