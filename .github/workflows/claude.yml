name: Claude Code

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    # Auto-review on non-draft PR open/update, or manual "@claude review" comment
    if: |
      (github.event_name == 'pull_request' && !github.event.pull_request.draft) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null &&
        (contains(github.event.comment.body, '@claude review') || contains(github.event.comment.body, '@claude code review'))) ||
      (github.event_name == 'pull_request_review_comment' &&
        (contains(github.event.comment.body, '@claude review') || contains(github.event.comment.body, '@claude code review'))) ||
      (github.event_name == 'pull_request_review' &&
        (contains(github.event.review.body, '@claude review') || contains(github.event.review.body, '@claude code review')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugins: 'pr-review-toolkit@claude-plugins-official'
          plugin_marketplaces: 'https://github.com/anthropics/claude-plugins-official.git'
          prompt: '/review-pr REPO: ${{ github.repository }} PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}'
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment"'
          settings: '{"enabledPlugins":{"pr-review-toolkit@claude-plugins-official":true}}'
          additional_permissions: |
            actions: read
          show_full_output: true

  claude:
    # General @claude mentions (not review)
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        !contains(github.event.comment.body, '@claude review') &&
        !contains(github.event.comment.body, '@claude code review')) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        !contains(github.event.comment.body, '@claude review') &&
        !contains(github.event.comment.body, '@claude code review')) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        !contains(github.event.review.body, '@claude review') &&
        !contains(github.event.review.body, '@claude code review')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
