name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.claude/**'
      - '**.md'
  workflow_dispatch:
    inputs:
      republish:
        description: >
          Comma-separated packages to re-publish from existing draft releases.
          Valid values: sdk, github-agent, legreffier, cli, api-client, dspy-adapters, skill, design-system
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: Release Please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      sdk-release-created: ${{ steps.release.outputs['libs/sdk--release_created'] }}
      sdk-tag-name: ${{ steps.release.outputs['libs/sdk--tag_name'] }}
      api-client-release-created: ${{ steps.release.outputs['libs/moltnet-api-client--release_created'] }}
      api-client-tag-name: ${{ steps.release.outputs['libs/moltnet-api-client--tag_name'] }}
      api-client-version: ${{ steps.release.outputs['libs/moltnet-api-client--version'] }}
      dspy-adapters-release-created: ${{ steps.release.outputs['libs/dspy-adapters--release_created'] }}
      dspy-adapters-tag-name: ${{ steps.release.outputs['libs/dspy-adapters--tag_name'] }}
      dspy-adapters-version: ${{ steps.release.outputs['libs/dspy-adapters--version'] }}
      cli-release-created: ${{ steps.release.outputs['apps/moltnet-cli--release_created'] }}
      cli-tag-name: ${{ steps.release.outputs['apps/moltnet-cli--tag_name'] }}
      github-agent-release-created: ${{ steps.release.outputs['packages/github-agent--release_created'] }}
      github-agent-tag-name: ${{ steps.release.outputs['packages/github-agent--tag_name'] }}
      skill-release-created: ${{ steps.release.outputs['packages/openclaw-skill--release_created'] }}
      skill-tag-name: ${{ steps.release.outputs['packages/openclaw-skill--tag_name'] }}
      skill-version: ${{ steps.release.outputs['packages/openclaw-skill--version'] }}
      legreffier-release-created: ${{ steps.release.outputs['packages/legreffier-cli--release_created'] }}
      legreffier-tag-name: ${{ steps.release.outputs['packages/legreffier-cli--tag_name'] }}
      design-system-release-created: ${{ steps.release.outputs['libs/design-system--release_created'] }}
      design-system-tag-name: ${{ steps.release.outputs['libs/design-system--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Unified resolution: merges release-please outputs with manual republish
  # inputs so downstream jobs use a single set of outputs regardless of trigger.
  resolve-publish:
    name: Resolve packages to publish
    needs: release-please
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    outputs:
      sdk: ${{ steps.resolve.outputs.sdk }}
      sdk-tag: ${{ steps.resolve.outputs.sdk-tag }}
      github-agent: ${{ steps.resolve.outputs.github-agent }}
      github-agent-tag: ${{ steps.resolve.outputs.github-agent-tag }}
      cli: ${{ steps.resolve.outputs.cli }}
      cli-tag: ${{ steps.resolve.outputs.cli-tag }}
      api-client: ${{ steps.resolve.outputs.api-client }}
      api-client-tag: ${{ steps.resolve.outputs.api-client-tag }}
      api-client-version: ${{ steps.resolve.outputs.api-client-version }}
      dspy-adapters: ${{ steps.resolve.outputs.dspy-adapters }}
      dspy-adapters-tag: ${{ steps.resolve.outputs.dspy-adapters-tag }}
      dspy-adapters-version: ${{ steps.resolve.outputs.dspy-adapters-version }}
      skill: ${{ steps.resolve.outputs.skill }}
      skill-tag: ${{ steps.resolve.outputs.skill-tag }}
      skill-version: ${{ steps.resolve.outputs.skill-version }}
      legreffier: ${{ steps.resolve.outputs.legreffier }}
      legreffier-tag: ${{ steps.resolve.outputs.legreffier-tag }}
      design-system: ${{ steps.resolve.outputs.design-system }}
      design-system-tag: ${{ steps.resolve.outputs.design-system-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve publish targets
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RP_SDK_CREATED: ${{ needs.release-please.outputs.sdk-release-created }}
          RP_SDK_TAG: ${{ needs.release-please.outputs.sdk-tag-name }}
          RP_AGENT_CREATED: ${{ needs.release-please.outputs.github-agent-release-created }}
          RP_AGENT_TAG: ${{ needs.release-please.outputs.github-agent-tag-name }}
          RP_CLI_CREATED: ${{ needs.release-please.outputs.cli-release-created }}
          RP_CLI_TAG: ${{ needs.release-please.outputs.cli-tag-name }}
          RP_API_CREATED: ${{ needs.release-please.outputs.api-client-release-created }}
          RP_API_TAG: ${{ needs.release-please.outputs.api-client-tag-name }}
          RP_API_VERSION: ${{ needs.release-please.outputs.api-client-version }}
          RP_DSPY_CREATED: ${{ needs.release-please.outputs.dspy-adapters-release-created }}
          RP_DSPY_TAG: ${{ needs.release-please.outputs.dspy-adapters-tag-name }}
          RP_DSPY_VERSION: ${{ needs.release-please.outputs.dspy-adapters-version }}
          RP_SKILL_CREATED: ${{ needs.release-please.outputs.skill-release-created }}
          RP_SKILL_TAG: ${{ needs.release-please.outputs.skill-tag-name }}
          RP_SKILL_VERSION: ${{ needs.release-please.outputs.skill-version }}
          RP_LEGREFFIER_CREATED: ${{ needs.release-please.outputs.legreffier-release-created }}
          RP_LEGREFFIER_TAG: ${{ needs.release-please.outputs.legreffier-tag-name }}
          RP_DESIGN_SYSTEM_CREATED: ${{ needs.release-please.outputs.design-system-release-created }}
          RP_DESIGN_SYSTEM_TAG: ${{ needs.release-please.outputs.design-system-tag-name }}
          REPUBLISH: ${{ github.event.inputs.republish || '' }}
        run: |
          find_draft_tag() {
            local component="$1"
            gh release list --repo "$GITHUB_REPOSITORY" --limit 20 --json tagName,isDraft \
              --jq "[.[] | select(.isDraft == true and (.tagName | startswith(\"${component}-v\")))][0].tagName // empty"
          }

          version_from_tag() {
            local tag="$1" component="$2"
            echo "${tag}" | sed "s/^${component}-v//"
          }

          wants_republish() {
            echo "$REPUBLISH" | tr ',' '\n' | tr -d ' ' | grep -qx "$1"
          }

          resolve() {
            local name="$1" rp_created="$2" rp_tag="$3" component="$4"

            if [ "$rp_created" = "true" ]; then
              echo "${name}=true" >> "$GITHUB_OUTPUT"
              echo "${name}-tag=${rp_tag}" >> "$GITHUB_OUTPUT"
              echo "  ✓ ${name}: release-please → ${rp_tag}"
              return
            fi

            if wants_republish "$name"; then
              local tag
              tag=$(find_draft_tag "$component")
              if [ -n "$tag" ]; then
                echo "${name}=true" >> "$GITHUB_OUTPUT"
                echo "${name}-tag=${tag}" >> "$GITHUB_OUTPUT"
                echo "  ✓ ${name}: republish draft → ${tag}"
                return
              fi
              echo "  ✗ ${name}: requested but no draft release found for '${component}'"
            fi

            echo "${name}=false" >> "$GITHUB_OUTPUT"
            echo "  - ${name}: skip"
          }

          echo "Resolving publish targets..."
          resolve "sdk"          "$RP_SDK_CREATED"       "$RP_SDK_TAG"       "sdk"
          resolve "github-agent" "$RP_AGENT_CREATED"     "$RP_AGENT_TAG"     "github-agent"
          resolve "cli"          "$RP_CLI_CREATED"       "$RP_CLI_TAG"       "cli"
          resolve "api-client"   "$RP_API_CREATED"       "$RP_API_TAG"       "moltnet-api-client"
          resolve "dspy-adapters" "$RP_DSPY_CREATED"     "$RP_DSPY_TAG"      "dspy-adapters"
          resolve "skill"        "$RP_SKILL_CREATED"     "$RP_SKILL_TAG"     "openclaw-skill"
          resolve "legreffier"   "$RP_LEGREFFIER_CREATED" "$RP_LEGREFFIER_TAG" "legreffier"
          resolve "design-system" "$RP_DESIGN_SYSTEM_CREATED" "$RP_DESIGN_SYSTEM_TAG" "design-system"

          # Forward version outputs
          if [ -n "$RP_API_VERSION" ]; then
            echo "api-client-version=${RP_API_VERSION}" >> "$GITHUB_OUTPUT"
          elif wants_republish "api-client"; then
            tag=$(find_draft_tag "moltnet-api-client")
            [ -n "$tag" ] && echo "api-client-version=$(version_from_tag "$tag" "moltnet-api-client")" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$RP_DSPY_VERSION" ]; then
            echo "dspy-adapters-version=${RP_DSPY_VERSION}" >> "$GITHUB_OUTPUT"
          elif wants_republish "dspy-adapters"; then
            tag=$(find_draft_tag "dspy-adapters")
            [ -n "$tag" ] && echo "dspy-adapters-version=$(version_from_tag "$tag" "dspy-adapters")" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$RP_SKILL_VERSION" ]; then
            echo "skill-version=${RP_SKILL_VERSION}" >> "$GITHUB_OUTPUT"
          elif wants_republish "skill"; then
            tag=$(find_draft_tag "openclaw-skill")
            [ -n "$tag" ] && echo "skill-version=$(version_from_tag "$tag" "openclaw-skill")" >> "$GITHUB_OUTPUT"
          fi

  publish-sdk:
    name: Publish SDK to npm
    needs: resolve-publish
    if: ${{ always() && needs.resolve-publish.outputs.sdk == 'true' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @moltnet/api-client build

      - run: pnpm --filter @moltnet/crypto-service build

      - run: pnpm --filter @themoltnet/sdk build

      - run: pnpm --filter @themoltnet/sdk test

      - run: pnpm --filter @themoltnet/sdk run check:pack

      - name: Check SDK type isolation
        run: pnpm --filter @themoltnet/sdk check:types-isolation

      - run: pnpm --filter @themoltnet/sdk publish --no-git-checks --access public --provenance

      - name: Publish SDK release
        run: gh release edit "${{ needs.resolve-publish.outputs.sdk-tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-github-agent:
    name: Publish GitHub Agent to npm
    needs: resolve-publish
    if: ${{ always() && needs.resolve-publish.outputs.github-agent == 'true' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @themoltnet/github-agent build

      - run: pnpm --filter @themoltnet/github-agent test

      - run: pnpm --filter @themoltnet/github-agent run check:pack

      - run: pnpm --filter @themoltnet/github-agent publish --no-git-checks --access public --provenance

      - name: Publish GitHub Agent release
        run: gh release edit "${{ needs.resolve-publish.outputs.github-agent-tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-api-client:
    name: Tag Go module for moltnet-api-client
    needs: resolve-publish
    if: ${{ needs.resolve-publish.outputs.api-client == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push Go module proxy tag
        # The Go module proxy resolves github.com/getlarge/themoltnet/libs/moltnet-api-client@vX.Y.Z
        # by looking for a git tag of the form "libs/moltnet-api-client/vX.Y.Z".
        # release-please creates the component tag "moltnet-api-client-vX.Y.Z"; we push the
        # additional tag that the Go toolchain needs.
        run: |
          TAG="libs/moltnet-api-client/v${{ needs.resolve-publish.outputs.api-client-version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish API client release
        run: gh release edit "${{ needs.resolve-publish.outputs.api-client-tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-dspy-adapters:
    name: Tag Go module for dspy-adapters
    needs: resolve-publish
    if: ${{ needs.resolve-publish.outputs.dspy-adapters == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push Go module proxy tag
        # The Go module proxy resolves github.com/getlarge/themoltnet/libs/dspy-adapters@vX.Y.Z
        # by looking for a git tag of the form "libs/dspy-adapters/vX.Y.Z".
        run: |
          TAG="libs/dspy-adapters/v${{ needs.resolve-publish.outputs.dspy-adapters-version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish dspy-adapters release
        run: gh release edit "${{ needs.resolve-publish.outputs.dspy-adapters-tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-cli:
    name: Release CLI binaries
    needs: resolve-publish
    if: ${{ always() && needs.resolve-publish.outputs.cli == 'true' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Extract semver from tag
        id: tag
        run: |
          TAG="${{ needs.resolve-publish.outputs.cli-tag }}"
          SEMVER="${TAG#cli-}"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token for Homebrew tap
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.MOLTNET_RELEASE_APP_ID }}
          private-key: ${{ secrets.MOLTNET_RELEASE_APP_KEY }}
          owner: getlarge
          repositories: homebrew-moltnet

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean --skip=validate
          workdir: apps/moltnet-cli
        env:
          GOWORK: off
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.semver }}
          HOMEBREW_TAP_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Upload binaries to GitHub Release
        run: |
          gh release upload "${{ needs.resolve-publish.outputs.cli-tag }}" \
            apps/moltnet-cli/dist/*.tar.gz \
            apps/moltnet-cli/dist/*.zip \
            apps/moltnet-cli/dist/checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish CLI release
        run: gh release edit "${{ needs.resolve-publish.outputs.cli-tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-cli-platforms:
    name: Publish @themoltnet/cli-${{ matrix.npm_dir }} to npm
    needs: [resolve-publish, release-cli]
    if: >-
      ${{
        always() &&
        needs.resolve-publish.outputs.cli == 'true' &&
        needs.release-cli.result == 'success' &&
        !failure() &&
        !cancelled()
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - npm_dir: linux-x64
            archive_suffix: linux_amd64.tar.gz
            binary: moltnet
          - npm_dir: linux-arm64
            archive_suffix: linux_arm64.tar.gz
            binary: moltnet
          - npm_dir: darwin-x64
            archive_suffix: darwin_amd64.tar.gz
            binary: moltnet
          - npm_dir: darwin-arm64
            archive_suffix: darwin_arm64.tar.gz
            binary: moltnet
          - npm_dir: win32-x64
            archive_suffix: windows_amd64.zip
            binary: moltnet.exe
          - npm_dir: win32-arm64
            archive_suffix: windows_arm64.zip
            binary: moltnet.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download release binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-publish.outputs.cli-tag }}
          ARCHIVE_SUFFIX: ${{ matrix.archive_suffix }}
        run: |
          SEMVER="${TAG#cli-v}"
          ARCHIVE="moltnet_${SEMVER}_${ARCHIVE_SUFFIX}"
          mkdir -p /tmp/cli-binaries
          # Stay in the repo checkout so gh can infer the repo from git;
          # --dir places the archive where the Extract step expects it.
          gh release download "$TAG" --pattern "$ARCHIVE" --dir /tmp/cli-binaries

      - name: Extract binary
        env:
          TAG: ${{ needs.resolve-publish.outputs.cli-tag }}
          ARCHIVE_SUFFIX: ${{ matrix.archive_suffix }}
          NPM_DIR: ${{ matrix.npm_dir }}
          BINARY: ${{ matrix.binary }}
        run: |
          SEMVER="${TAG#cli-v}"
          ARCHIVE="moltnet_${SEMVER}_${ARCHIVE_SUFFIX}"
          PKG_DIR="packages/cli/npm/${NPM_DIR}"

          mkdir -p "${PKG_DIR}/bin"
          if [[ "${ARCHIVE}" == *.zip ]]; then
            unzip -o "/tmp/cli-binaries/${ARCHIVE}" "${BINARY}" -d "${PKG_DIR}/bin/"
          else
            tar xzf "/tmp/cli-binaries/${ARCHIVE}" -C "${PKG_DIR}/bin/" "${BINARY}"
          fi
          chmod +x "${PKG_DIR}/bin/${BINARY}" 2>/dev/null || true

      - name: Publish platform package
        working-directory: packages/cli/npm/${{ matrix.npm_dir }}
        run: npm publish --access public --provenance

  publish-cli-wrapper:
    name: Publish @themoltnet/cli to npm
    needs: [resolve-publish, publish-cli-platforms]
    if: >-
      ${{
        always() &&
        needs.resolve-publish.outputs.cli == 'true' &&
        needs.publish-cli-platforms.result == 'success' &&
        !failure() &&
        !cancelled()
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # pnpm publish rewrites workspace:* in optionalDependencies to the
      # concrete version so the published tarball resolves on npm.
      - run: pnpm --filter @themoltnet/cli publish --no-git-checks --access public --provenance

  release-skill:
    name: Release OpenClaw Skill
    needs: resolve-publish
    if: ${{ needs.resolve-publish.outputs.skill == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package skill tarball
        run: packages/openclaw-skill/scripts/package.sh /tmp

      - name: Upload tarball to GitHub Release
        run: |
          gh release upload "${{ needs.resolve-publish.outputs.skill-tag }}" \
            "/tmp/moltnet-skill-v${{ needs.resolve-publish.outputs.skill-version }}.tar.gz"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        run: gh release edit "${{ needs.resolve-publish.outputs.skill-tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-skill-clawhub:
    name: Publish Skill to ClawHub
    needs: [resolve-publish, release-skill]
    if: ${{ always() && needs.resolve-publish.outputs.skill == 'true' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0

      - name: Authenticate with ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: npx clawhub auth login --token "$CLAWHUB_TOKEN" --no-browser

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          packages/openclaw-skill/scripts/publish-clawhub.sh \
            --changelog "Release ${{ needs.resolve-publish.outputs.skill-tag }}"

  publish-legreffier:
    name: Publish LeGreffier to npm
    needs: resolve-publish
    if: ${{ always() && needs.resolve-publish.outputs.legreffier == 'true' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @moltnet/api-client build

      - run: pnpm --filter @moltnet/crypto-service build

      - run: pnpm --filter @themoltnet/sdk build

      - run: pnpm --filter @themoltnet/design-system build

      - run: pnpm --filter @themoltnet/legreffier build

      - run: pnpm --filter @themoltnet/legreffier test

      - run: pnpm --filter @themoltnet/legreffier run check:pack

      - run: pnpm --filter @themoltnet/legreffier publish --no-git-checks --access public --provenance

      - name: Publish LeGreffier release
        run: gh release edit "${{ needs.resolve-publish.outputs.legreffier-tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-design-system:
    name: Publish Design System to npm
    needs: resolve-publish
    if: ${{ always() && needs.resolve-publish.outputs.design-system == 'true' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @themoltnet/design-system build

      - run: pnpm --filter @themoltnet/design-system run check:pack

      - run: pnpm --filter @themoltnet/design-system publish --no-git-checks --access public --provenance

      - name: Publish Design System release
        run: gh release edit "${{ needs.resolve-publish.outputs.design-system-tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
