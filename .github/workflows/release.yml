name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Plan the release without committing, tagging, creating releases, or publishing.'
        required: false
        type: boolean
        default: false
      groups:
        description: 'Optional comma-separated Nx release groups. Empty means affected groups.'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  NX_LOAD_DOT_ENV_FILES: 'false'

jobs:
  prepare:
    name: Prepare release groups
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release): publish') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      go-cli-groups: ${{ steps.release-groups.outputs.go-cli-groups }}
      release-go-cli: ${{ steps.release-groups.outputs.release-go-cli }}
      release-npm: ${{ steps.release-groups.outputs.release-npm }}
      release-github-actions: ${{ steps.release-groups.outputs.release-github-actions }}
      release-docker: ${{ steps.release-groups.outputs.release-docker }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Guard production ref
        if: ${{ !inputs.dry-run && github.ref_name != 'main' }}
        run: |
          echo 'Non-dry-run releases must run from main.'
          exit 1

      - name: Detect release groups
        id: release-groups
        shell: bash
        env:
          BASE_SHA: ${{ github.event.before || '' }}
          MANUAL_GROUPS: ${{ inputs.groups || '' }}
          PNPM_CONFIG_LOGLEVEL: error
        run: |
          set -euo pipefail

          if [ -n "$MANUAL_GROUPS" ]; then
            AFFECTED_JSON='[]'
          else
            BASE="$BASE_SHA"
            if [ -z "$BASE" ] || [ "$BASE" = '0000000000000000000000000000000000000000' ]; then
              BASE="$(git rev-parse HEAD~1)"
            fi
            AFFECTED_JSON="$(pnpm --silent exec nx show projects --affected --base="$BASE" --head=HEAD --json)"
          fi

          node - "$AFFECTED_JSON" "$MANUAL_GROUPS" >> "$GITHUB_OUTPUT" <<'NODE'
          const { readFileSync } = require('node:fs');

          const nx = JSON.parse(readFileSync('nx.json', 'utf8'));
          const releaseGroups = nx.release?.groups ?? {};
          const knownGroups = new Set(Object.keys(releaseGroups));
          const projectToGroup = new Map();
          for (const [groupName, group] of Object.entries(releaseGroups)) {
            for (const project of group.projects ?? []) {
              projectToGroup.set(project, groupName);
            }
          }

          const affected = JSON.parse(process.argv[2] || '[]');
          const manualGroups = process.argv[3]
            .split(',')
            .map((group) => group.trim())
            .filter(Boolean);

          const groups = new Set();
          for (const group of manualGroups) {
            if (!knownGroups.has(group)) {
              throw new Error(`Unknown Nx release group: ${group}`);
            }
            groups.add(group);
          }

          if (manualGroups.length === 0) {
            for (const project of affected) {
              const group = projectToGroup.get(project);
              if (group) groups.add(group);
            }
          }

          const goCliGroups = [];
          if (groups.has('go-modules')) {
            goCliGroups.push('go-modules');
            groups.add('cli');
          }
          if (groups.has('cli')) {
            goCliGroups.push('cli');
          }

          const output = {
            'go-cli-groups': goCliGroups.join(','),
            'release-go-cli': goCliGroups.length > 0,
            'release-npm': groups.has('npm-packages'),
            'release-github-actions': groups.has('github-actions'),
            'release-docker': groups.has('docker-images'),
          };

          for (const [key, value] of Object.entries(output)) {
            console.log(`${key}=${value}`);
          }

          const selected = [
            output['go-cli-groups'],
            output['release-npm'] ? 'npm-packages' : '',
            output['release-github-actions'] ? 'github-actions' : '',
            output['release-docker'] ? 'docker-images' : '',
          ].filter(Boolean);
          console.error(
            selected.length > 0
              ? `Releasing Nx groups: ${selected.join('; ')}`
              : 'No affected Nx release groups; skipping release.',
          );
          NODE

  release-go-cli:
    name: Release Go modules and CLI
    needs: prepare
    if: ${{ needs.prepare.outputs.release-go-cli == 'true' }}
    uses: ./.github/workflows/release-group.yml
    with:
      checkout-ref: ${{ github.event_name == 'push' && 'main' || github.ref_name }}
      groups: ${{ needs.prepare.outputs.go-cli-groups }}
      dry-run: ${{ inputs.dry-run || false }}
    secrets: inherit

  release-npm:
    name: Release npm packages
    needs: [prepare, release-go-cli]
    if: ${{ always() && needs.prepare.outputs.release-npm == 'true' && (needs.release-go-cli.result == 'success' || needs.release-go-cli.result == 'skipped') }}
    uses: ./.github/workflows/release-group.yml
    with:
      checkout-ref: ${{ github.event_name == 'push' && 'main' || github.ref_name }}
      groups: npm-packages
      dry-run: ${{ inputs.dry-run || false }}
    secrets: inherit

  release-github-actions:
    name: Release GitHub Actions
    needs: [prepare, release-npm]
    if: ${{ always() && needs.prepare.outputs.release-github-actions == 'true' && (needs.release-npm.result == 'success' || needs.release-npm.result == 'skipped') }}
    uses: ./.github/workflows/release-group.yml
    with:
      checkout-ref: ${{ github.event_name == 'push' && 'main' || github.ref_name }}
      groups: github-actions
      dry-run: ${{ inputs.dry-run || false }}
    secrets: inherit

  release-docker:
    name: Release Docker images
    needs: [prepare, release-github-actions]
    if: ${{ always() && needs.prepare.outputs.release-docker == 'true' && (needs.release-github-actions.result == 'success' || needs.release-github-actions.result == 'skipped') }}
    uses: ./.github/workflows/release-group.yml
    with:
      checkout-ref: ${{ github.event_name == 'push' && 'main' || github.ref_name }}
      groups: docker-images
      dry-run: ${{ inputs.dry-run || false }}
    secrets: inherit
