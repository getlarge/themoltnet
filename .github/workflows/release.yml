name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Plan the release without committing, tagging, creating releases, or publishing.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  NX_LOAD_DOT_ENV_FILES: 'false'

jobs:
  nx-release:
    name: Nx Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: actions/setup-go@v6
        with:
          go-version-file: apps/moltnet-cli/go.mod
          cache: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ !inputs['dry-run'] }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - name: Detect version plans
        id: version-plans
        shell: bash
        run: |
          GROUPS=$(node <<'NODE'
          const { readdirSync, readFileSync } = require('node:fs');
          const { join } = require('node:path');

          const nx = JSON.parse(readFileSync('nx.json', 'utf8'));
          const groupNames = new Set(Object.keys(nx.release?.groups ?? {}));
          const projectToGroup = new Map();
          for (const [groupName, group] of Object.entries(nx.release?.groups ?? {})) {
            for (const project of group.projects ?? []) {
              projectToGroup.set(project, groupName);
            }
          }

          function listMarkdownFiles(dir) {
            try {
              return readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
                const path = join(dir, entry.name);
                if (entry.isDirectory()) return listMarkdownFiles(path);
                return entry.isFile() && entry.name.endsWith('.md') ? [path] : [];
              });
            } catch {
              return [];
            }
          }

          const groups = new Set();
          for (const file of listMarkdownFiles('.nx/version-plans')) {
            const match = /^---\n([\s\S]*?)\n---/m.exec(readFileSync(file, 'utf8'));
            if (!match) continue;
            for (const line of match[1].split('\n')) {
              const key = /^([^:#]+):/.exec(line.trim())?.[1]?.trim();
              if (!key) continue;
              if (groupNames.has(key)) groups.add(key);
              const groupName = projectToGroup.get(key);
              if (groupName) groups.add(groupName);
            }
          }

          process.stdout.write([...groups].sort().join(','));
          NODE
          )

          if [ -n "$GROUPS" ]; then
            echo 'has-plans=true' >> "$GITHUB_OUTPUT"
            echo "groups=$GROUPS" >> "$GITHUB_OUTPUT"
            echo "Releasing Nx groups: $GROUPS"
          else
            echo 'has-plans=false' >> "$GITHUB_OUTPUT"
            echo 'No Nx release groups found in version plans; skipping release.'
          fi

      - name: Run Nx release
        if: ${{ steps.version-plans.outputs.has-plans == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_ACCESS: public
          NPM_CONFIG_PROVENANCE: 'true'
          GOPROXY: https://proxy.golang.org,direct
          GONOSUMDB: github.com/getlarge/themoltnet
        run: |
          GROUPS='${{ steps.version-plans.outputs.groups }}'
          if [ '${{ inputs['dry-run'] }}' = 'true' ]; then
            pnpm exec nx release --groups "$GROUPS" --dry-run --verbose --skip-publish
          else
            pnpm exec nx release --groups "$GROUPS" --verbose --skip-publish
            git push origin HEAD:main --follow-tags --no-verify --atomic
            pnpm exec nx release publish --groups "$GROUPS" --verbose
          fi
