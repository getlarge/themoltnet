# MoltNet mention bot — dogfooding the @themoltnet/agent-daemon-action
# against the monorepo that ships it.
#
# Multi-agent routing: each bot agent has its own GitHub Environment
# named after the agent (e.g. `legreffier`, `eval-agent`). The mention
# routes to a specific environment via:
#
#   @moltnet-fulfill[<agent>] <brief...>
#   @moltnet-assess[<agent>]
#
# When no `[<agent>]` qualifier is present the workflow defaults to
# the `legreffier` environment. Adopters running a single bot can
# omit the qualifier; running multiple bots in parallel just needs an
# Environment per agent + the qualifier on each comment.
#
# Provisioning each agent (one-time):
#
#   1. moltnet register --name <agent>            # one-time per agent
#   2. moltnet config export-env \
#        --credentials .moltnet/<agent>/moltnet.json \
#        --include-github-pem -o .env.<agent>
#   3. Create a GitHub Environment named exactly `<agent>` and upload
#      each MOLTNET_* line as a secret/variable (see action README
#      for the secret-vs-variable split). Add `ANTHROPIC_API_KEY` (or
#      another Pi-supported provider key) as a secret on the same
#      environment.
#   4. (Optional) Add reviewers/protection rules on the environment for
#      manual approval gating.
#
# This workflow consumes the action via `./packages/agent-daemon-action`
# (local path) so it always uses the source on the branch being tested.
# Other repos consume the action via
# `getlarge/themoltnet/packages/agent-daemon-action@<ref>` — see
# `docs/examples/workflows/moltnet-mention.yml` for that template.

name: MoltNet mention bot

on:
  issue_comment:
    types: [created]

# Default to no permissions on the workflow's GITHUB_TOKEN. Each job
# below declares only what it needs; jobs without a `permissions:`
# block inherit this empty default rather than the historical broad
# default-write set.
permissions: {}

jobs:
  parse:
    # Skip:
    #   - non-mention comments
    #   - comments authored by a bot (avoids the assess diagnostic
    #     comment re-triggering the workflow)
    if: |
      contains(github.event.comment.body, '@moltnet-') &&
      !endsWith(github.event.comment.user.login, '[bot]')
    runs-on: ubuntu-latest
    # Pure body parsing — no GH API access needed.
    permissions: {}
    outputs:
      agent: ${{ steps.extract.outputs.agent }}
    steps:
      - name: Extract target agent from mention
        id: extract
        env:
          BODY: ${{ github.event.comment.body }}
          # Comma-separated list of agent names allowed to receive
          # mentions. Without this, anyone who can comment could route
          # the workflow into any GitHub Environment that exists on the
          # repo (#1039). Empty/unset = no agents allowed (fail-closed).
          ALLOWLIST: ${{ vars.MOLTNET_AGENT_ALLOWLIST }}
        run: |
          set -euo pipefail
          # Match @moltnet-{fulfill,assess}[<agent>] — capture <agent>.
          # Fall back to `legreffier` when no [...] qualifier present.
          # Agent names follow the same charset as `moltnet register
          # --name`: [a-zA-Z0-9_-]+, max 64.
          if [[ "$BODY" =~ @moltnet-(fulfill|assess)\[([a-zA-Z0-9_-]{1,64})\] ]]; then
            AGENT="${BASH_REMATCH[2]}"
          else
            AGENT=legreffier
          fi
          # Allowlist gate: reject before emitting `agent` so the
          # dispatch job (which routes via `environment:` on the parse
          # output) never enters an unintended env. Comma-separated,
          # optional whitespace tolerated.
          if [ -z "${ALLOWLIST:-}" ]; then
            echo "::error::MOLTNET_AGENT_ALLOWLIST repo variable is not set; refusing to route. Add it under repo Settings → Variables (e.g. 'legreffier' or 'legreffier,assessor')." >&2
            exit 1
          fi
          ok=0
          IFS=',' read -ra ALLOWED <<< "$ALLOWLIST"
          for a in "${ALLOWED[@]}"; do
            # Strip surrounding whitespace.
            a="${a#"${a%%[![:space:]]*}"}"
            a="${a%"${a##*[![:space:]]}"}"
            if [ "$a" = "$AGENT" ]; then ok=1; break; fi
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Agent '$AGENT' is not in MOLTNET_AGENT_ALLOWLIST ('$ALLOWLIST'). Update the repo variable to authorize this agent." >&2
            exit 1
          fi
          echo "agent=$AGENT" >> "$GITHUB_OUTPUT"
          echo "::notice::Routing to environment '$AGENT'"

  dispatch:
    needs: [parse]
    runs-on: ubuntu-latest
    # Hard ceiling on a single agent run. GitHub sends SIGTERM at
    # `timeout-minutes - 5` and SIGKILL at exactly `timeout-minutes`,
    # so the daemon's signal handlers get a 5-min grace window to
    # call `tasks.fail()` cleanly. Pair with `running-timeout-sec`
    # on the action below (set slightly higher so the queue's view
    # outlasts the runner) — see action.yml `running-timeout-sec`
    # docs for the rationale.
    timeout-minutes: 30
    environment: ${{ needs.parse.outputs.agent }}
    # contents: read       — actions/checkout
    # issues: write        — post diagnostic comments on issues / PRs
    # pull-requests: read  — read PR head ref / commits / body for
    #   correlationId resolution. The agent inside Pi opens PRs with
    #   its own GitHub App token, not GITHUB_TOKEN.
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./packages/agent-daemon-action
        with:
          # Server-side cap, slightly higher than `timeout-minutes`
          # above (30 min = 1800s + 5min SIGTERM grace = 2100s; pad
          # to 2400s/40 min so the server cap never beats the runner
          # cap to the punch).
          running-timeout-sec: '2400'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Agent identity (required) — sourced from `moltnet config
          # export-env` against the dogfooding agent's moltnet.json.
          MOLTNET_AGENT_NAME: ${{ vars.MOLTNET_AGENT_NAME }}
          MOLTNET_IDENTITY_ID: ${{ secrets.MOLTNET_IDENTITY_ID }}
          MOLTNET_CLIENT_ID: ${{ secrets.MOLTNET_CLIENT_ID }}
          MOLTNET_CLIENT_SECRET: ${{ secrets.MOLTNET_CLIENT_SECRET }}
          MOLTNET_PUBLIC_KEY: ${{ secrets.MOLTNET_PUBLIC_KEY }}
          MOLTNET_PRIVATE_KEY: ${{ secrets.MOLTNET_PRIVATE_KEY }}
          MOLTNET_FINGERPRINT: ${{ secrets.MOLTNET_FINGERPRINT }}
          # Workspace context (required)
          MOLTNET_TEAM_ID: ${{ vars.MOLTNET_TEAM_ID }}
          MOLTNET_DIARY_ID: ${{ vars.MOLTNET_DIARY_ID }}
          MOLTNET_API_URL: ${{ vars.MOLTNET_API_URL }}
          # Runtime profile (required). The profile supplies provider,
          # model, sandbox policy, prerequisites, and runtime defaults.
          MOLTNET_AGENT_PROFILE: ${{ vars.MOLTNET_AGENT_PROFILE }}
          # GitHub App (optional but recommended — when set, the agent's
          # gh operations appear as the bot identity)
          MOLTNET_GITHUB_APP_ID: ${{ vars.MOLTNET_GITHUB_APP_ID }}
          MOLTNET_GITHUB_APP_INSTALLATION_ID: ${{ vars.MOLTNET_GITHUB_APP_INSTALLATION_ID }}
          MOLTNET_GITHUB_APP_SLUG: ${{ vars.MOLTNET_GITHUB_APP_SLUG }}
          MOLTNET_GITHUB_APP_PRIVATE_KEY: ${{ secrets.MOLTNET_GITHUB_APP_PRIVATE_KEY }}
          # Pi provider auth. Two mutually-compatible options:
          #   - Env-var providers (cheapest, stateless): set
          #     ANTHROPIC_API_KEY / OPENAI_API_KEY / etc. Pi reads
          #     these natively.
          #   - Subscription OAuth (covered by ChatGPT Plus/Pro,
          #     Claude Pro/Max, GitHub Copilot): set PI_AUTH_JSON to
          #     the contents of `~/.pi/agent/auth.json` produced by
          #     `pi /login` on a developer machine. The action writes
          #     it to $RUNNER_TEMP and points Pi at it via
          #     PI_AUTH_PATH. Re-seed manually when the refresh window
          #     elapses (~30 days for Codex).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PI_AUTH_JSON: ${{ secrets.PI_AUTH_JSON }}
