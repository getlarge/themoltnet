name: Agent Daemon E2E

on:
  workflow_call:
    inputs:
      live-llm:
        description: Run the skipped-by-default live Ollama Cloud daemon spec.
        required: false
        type: boolean
        default: false
      rest-api-image:
        required: false
        type: string
        default: ghcr.io/getlarge/themoltnet/rest-api:latest
      mcp-server-image:
        required: false
        type: string
        default: ghcr.io/getlarge/themoltnet/mcp-server:latest
      db-migrate-image:
        required: false
        type: string
        default: ghcr.io/getlarge/themoltnet/db-migrate:latest
      console-image:
        required: false
        type: string
        default: ghcr.io/getlarge/themoltnet/console:latest
      mcp-host-image:
        required: false
        type: string
        default: ghcr.io/getlarge/themoltnet/mcp-host:latest
    secrets:
      OLLAMA_API_KEY:
        required: false

env:
  NX_LOAD_DOT_ENV_FILES: 'false'

jobs:
  agent-daemon-e2e:
    name: Agent Daemon E2E
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.live-llm && 60 || 15 }}
    permissions:
      contents: read
      packages: read
    concurrency:
      group: agent-daemon-live-llm-${{ inputs.live-llm && github.ref || github.run_id }}
      cancel-in-progress: false
    env:
      REST_API_IMAGE: ${{ inputs.rest-api-image }}
      MCP_SERVER_IMAGE: ${{ inputs.mcp-server-image }}
      DB_MIGRATE_IMAGE: ${{ inputs.db-migrate-image }}
      CONSOLE_IMAGE: ${{ inputs.console-image }}
      MCP_HOST_IMAGE: ${{ inputs.mcp-host-image }}
      DATABASE_URL: postgresql://moltnet:moltnet_secret@localhost:5433/moltnet
      ORY_HYDRA_ADMIN_URL: http://localhost:4445
      ORY_HYDRA_PUBLIC_URL: http://localhost:4444
      ORY_KETO_PUBLIC_URL: http://localhost:4466
      ORY_KETO_ADMIN_URL: http://localhost:4467
      ORY_KRATOS_ADMIN_URL: http://localhost:4434
      ORY_KRATOS_PUBLIC_URL: http://localhost:4433
      SERVER_BASE_URL: http://localhost:8080
      ORY_ACTION_API_KEY: local-dev-webhook-key
      MOLTNET_AGENT_DAEMON_LIVE_LLM_E2E: ${{ inputs.live-llm && '1' || '0' }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Start Docker Compose stack
        env:
          COMPOSE_DISABLE_ENV_FILE: true
        run: docker compose -f docker-compose.e2e.yaml -f docker-compose.e2e.ci.yaml up -d
      - name: Run agent-daemon E2E tests
        run: |
          if [ "$MOLTNET_AGENT_DAEMON_LIVE_LLM_E2E" = "1" ]; then
            pnpm exec nx run @themoltnet/agent-daemon:e2e --skipNxCache
          else
            pnpm exec nx run @themoltnet/agent-daemon:e2e
          fi
      - name: Docker Compose logs
        if: failure()
        run: docker compose -f docker-compose.e2e.yaml -f docker-compose.e2e.ci.yaml logs --tail=50
      - name: Teardown Docker Compose
        if: always()
        run: docker compose -f docker-compose.e2e.yaml -f docker-compose.e2e.ci.yaml down -v --remove-orphans
