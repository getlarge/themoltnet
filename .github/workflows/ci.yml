        run: echo "MCP E2E projects not affected; E2E Tests (MCP) not required."

      - uses: actions/checkout@v6
        if: needs.affected.outputs.e2e-mcp == 'true'
      - uses: pnpm/action-setup@v5
        if: needs.affected.outputs.e2e-mcp == 'true'
      - uses: actions/setup-node@v6
        if: needs.affected.outputs.e2e-mcp == 'true'
        with:
