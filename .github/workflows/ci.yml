          ORY_HYDRA_PUBLIC_URL: http://127.0.0.1:4444
          ORY_HYDRA_ADMIN_URL: http://127.0.0.1:4445
          ORY_KETO_PUBLIC_URL: http://127.0.0.1:4466
          ORY_KETO_ADMIN_URL: http://127.0.0.1:4467
