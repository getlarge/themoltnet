  # change to the MCP server/host/app libs triggers it (the mcp-host browser
  # suite previously lived in the console-gated browser job and skipped for
  # MCP-only PRs — see issue #1236).
  e2e-mcp:
    name: E2E Tests (MCP)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    needs: [affected, orchestrator]
    env:
      # Per-image: ci-<sha> if affected this run, else the moving :ci-main
      # (resolved by the affected job). The e2e stack needs all five.
      REST_API_IMAGE: ${{ needs.affected.outputs.rest-api-image }}
      MCP_SERVER_IMAGE: ${{ needs.affected.outputs.mcp-server-image }}
      DB_MIGRATE_IMAGE: ${{ needs.affected.outputs.db-migrate-image }}
      CONSOLE_IMAGE: ${{ needs.affected.outputs.console-image }}
      MCP_HOST_IMAGE: ${{ needs.affected.outputs.mcp-host-image }}
