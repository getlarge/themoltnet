name: Nx Release Candidate

on:
  workflow_dispatch:
    inputs:
      groups:
        description: >
          Nx release groups to dry-run. Use a comma-separated list or "all".
          Examples: npm-packages, go-modules,cli, github-actions, docker-images
        required: true
        default: github-actions
        type: string
      specifier:
        description: Semver specifier passed to `nx release version`.
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      run_publish_dry_runs:
        description: Run custom nx-release-publish dry-runs for selected groups.
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  NX_LOAD_DOT_ENV_FILES: 'false'

jobs:
  candidate:
    name: Dry-run Nx release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - run: pnpm install --frozen-lockfile

      - name: Validate release group input
        env:
          RELEASE_GROUPS: ${{ inputs.groups }}
        run: |
          set -euo pipefail
          groups="${RELEASE_GROUPS// /}"
          if [ "$groups" = "all" ]; then
            exit 0
          fi

          IFS=',' read -ra requested <<< "$groups"
          for group in "${requested[@]}"; do
            case "$group" in
              cli|docker-images|github-actions|go-modules|npm-packages)
                ;;
              *)
                echo "Unknown Nx release group: $group" >&2
                exit 1
                ;;
            esac
          done

      - name: Dry-run Nx release version
        env:
          NX_DRY_RUN: 'true'
          RELEASE_GROUPS: ${{ inputs.groups }}
          RELEASE_SPECIFIER: ${{ inputs.specifier }}
        run: |
          set -euo pipefail
          groups="${RELEASE_GROUPS// /}"
          if [ "$groups" = "all" ]; then
            pnpm exec nx release version "$RELEASE_SPECIFIER" --dry-run --verbose
          else
            pnpm exec nx release version "$RELEASE_SPECIFIER" --groups "$groups" --dry-run --verbose
          fi

      - name: Dry-run CLI artifact publish target
        if: ${{ inputs.run_publish_dry_runs }}
        env:
          RELEASE_GROUPS: ${{ inputs.groups }}
        run: |
          set -euo pipefail
          groups="${RELEASE_GROUPS// /}"
          if [ "$groups" != "all" ] && [[ ",$groups," != *",cli,"* ]]; then
            echo "Skipping CLI artifact dry-run; cli group not selected."
            exit 0
          fi

          pnpm exec nx run moltnet-cli:nx-release-publish --skipNxCache -- --dry-run --verbose

      - name: Dry-run GitHub Action publish target
        if: ${{ inputs.run_publish_dry_runs }}
        env:
          RELEASE_GROUPS: ${{ inputs.groups }}
        run: |
          set -euo pipefail
          groups="${RELEASE_GROUPS// /}"
          if [ "$groups" != "all" ] && [[ ",$groups," != *",github-actions,"* ]]; then
            echo "Skipping GitHub Action publish dry-run; github-actions group not selected."
            exit 0
          fi

          pnpm exec nx run @themoltnet/agent-daemon-action:nx-release-publish --skipNxCache -- --dry-run
