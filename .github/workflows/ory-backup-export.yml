name: Ory Backup Export

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read

jobs:
  export:
    name: Export encrypted Ory backup bundle
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0

      - name: Install AWS CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install awscli

      - name: Install Ory CLI
        run: bash <(curl -s https://raw.githubusercontent.com/ory/meta/master/install.sh) -d -b /usr/local/bin ory

      - name: Export backup bundle
        env:
          DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}
          ORY_PROJECT_ID: ${{ secrets.ORY_PROJECT_ID }}
          ORY_WORKSPACE_API_KEY: ${{ secrets.ORY_WORKSPACE_API_KEY }}
          ORY_PROJECT_API_KEY: ${{ secrets.ORY_PROJECT_API_KEY }}
          ORY_BACKUP_PASSPHRASE: ${{ secrets.ORY_BACKUP_PASSPHRASE }}
          ORY_JWK_SET_IDS: ${{ secrets.ORY_JWK_SET_IDS }}
        run: >
          npx @dotenvx/dotenvx run -f env.public -f .env --
          node infra/ory/backup.mjs
          --output-dir .ory-backups/github-actions

      - name: Upload encrypted backup to Tigris
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ vars.BACKUP_AWS_ENDPOINT_URL_S3 }}
          AWS_REGION: ${{ vars.BACKUP_AWS_REGION }}
          BUCKET_NAME: ${{ vars.BACKUP_BUCKET_NAME }}
        run: |
          TS="$(date -u +%Y/%m/%d/%H%M%S)"
          PREFIX="ory/${TS}-${GITHUB_SHA}"
          aws --endpoint-url "$AWS_ENDPOINT_URL_S3" s3 cp \
            .ory-backups/github-actions/bundle.tar.gz.enc \
            "s3://${BUCKET_NAME}/${PREFIX}/bundle.tar.gz.enc"
          aws --endpoint-url "$AWS_ENDPOINT_URL_S3" s3 cp \
            .ory-backups/github-actions/bundle.tar.gz.enc.metadata.json \
            "s3://${BUCKET_NAME}/${PREFIX}/bundle.tar.gz.enc.metadata.json"
          aws --endpoint-url "$AWS_ENDPOINT_URL_S3" s3 cp \
            .ory-backups/github-actions/metadata.json \
            "s3://${BUCKET_NAME}/${PREFIX}/metadata.json"
          aws --endpoint-url "$AWS_ENDPOINT_URL_S3" s3 cp \
            .ory-backups/github-actions/README.txt \
            "s3://${BUCKET_NAME}/${PREFIX}/README.txt"

      - name: Upload workflow artifact copy
        uses: actions/upload-artifact@v4
        with:
          name: ory-backup-${{ github.run_id }}
          path: |
            .ory-backups/github-actions/bundle.tar.gz.enc
            .ory-backups/github-actions/bundle.tar.gz.enc.metadata.json
            .ory-backups/github-actions/metadata.json
            .ory-backups/github-actions/README.txt
          retention-days: 14
