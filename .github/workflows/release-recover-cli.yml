name: Release Recover (moltnet-cli)

# Recovers a stuck `apps/moltnet-cli` release cycle after release-cli's
# goreleaser step failed because the cli was released in the same cycle as
# one or more libs it depends on. release-please bumps the lib versions in
# the manifest but does NOT sync `apps/moltnet-cli/go.mod`, so goreleaser
# builds against a stale pin that doesn't yet contain the new symbols.
#
# The recipe (see docs/recipes/release-recovery.md):
#   1. Revert cli version in the manifest to the previous released version
#   2. Drop the premature `## [x.y.z]` section from cli CHANGELOG
#   3. `GOWORK=off go get <lib>@<version>` for each bumped lib + go mod tidy
#   4. Commit on a branch, open PR (squash-merge it manually)
#   5. Delete the stuck draft `cli-vX.Y.Z` GitHub release
#
# After merging the PR, release-please will re-propose the cli bump with a
# synced go.mod on main, and the next release-cli run will succeed.

on:
  workflow_dispatch:
    inputs:
      previous-cli-version:
        description: 'Last successfully released cli version (e.g. 1.18.0)'
        required: true
        type: string
      stuck-cli-version:
        description: 'Stuck cli version to roll back (e.g. 1.19.0)'
        required: true
        type: string
      bumped-libs:
        description: >
          Comma-separated `name=version` pairs for libs to sync in go.mod.
          Example: `dspy-adapters=0.8.0,moltnet-api-client=1.11.0`
        required: true
        type: string
      delete-draft-release:
        description: 'Delete the stuck draft GitHub release cli-v<stuck>'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  recover:
    name: Recover cli release cycle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/moltnet-cli/go.mod
          cache: false

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Create recovery branch
        id: branch
        run: |
          BRANCH="chore/recover-cli-v${{ inputs.stuck-cli-version }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Revert manifest cli version
        run: |
          jq --arg v '${{ inputs.previous-cli-version }}' \
            '."apps/moltnet-cli" = $v' .release-please-manifest.json \
            > .release-please-manifest.json.tmp
          mv .release-please-manifest.json.tmp .release-please-manifest.json
          git diff --stat .release-please-manifest.json

      - name: Drop premature CHANGELOG section
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('apps/moltnet-cli/CHANGELOG.md')
          text = p.read_text()
          stuck = '${{ inputs.stuck-cli-version }}'
          pattern = re.compile(
              r'^## \[?' + re.escape(stuck) + r'\]?.*?(?=^## \[)',
              re.MULTILINE | re.DOTALL,
          )
          new = pattern.sub('', text, count=1)
          if new == text:
              print(f'WARNING: no ## [{stuck}] section found — nothing removed')
          p.write_text(new)
          PY
          git diff --stat apps/moltnet-cli/CHANGELOG.md

      - name: Sync apps/moltnet-cli/go.mod to bumped libs
        working-directory: apps/moltnet-cli
        env:
          GOWORK: off
        run: |
          IFS=',' read -ra PAIRS <<< '${{ inputs.bumped-libs }}'
          for pair in "${PAIRS[@]}"; do
            name="${pair%%=*}"
            version="${pair##*=}"
            module="github.com/getlarge/themoltnet/libs/${name}"
            echo "::group::go get ${module}@v${version}"
            go get "${module}@v${version}"
            echo "::endgroup::"
          done
          go mod tidy
          go build ./...

      - name: Commit and push
        run: |
          git add \
            .release-please-manifest.json \
            apps/moltnet-cli/CHANGELOG.md \
            apps/moltnet-cli/go.mod \
            apps/moltnet-cli/go.sum
          if git diff --cached --quiet; then
            echo 'No changes to commit — nothing to recover.'
            exit 1
          fi
          git commit -m "fix(release): recover cli v${{ inputs.stuck-cli-version }} release cycle"
          git push -u origin '${{ steps.branch.outputs.name }}'

      - name: Open recovery PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head '${{ steps.branch.outputs.name }}' \
            --title "fix(release): recover cli v${{ inputs.stuck-cli-version }} release cycle" \
            --body "$(cat <<'EOF'
          Automated recovery for a stuck `apps/moltnet-cli` release cycle.

          **What this PR does:**
          - Reverts `apps/moltnet-cli` in `.release-please-manifest.json` to the previous version
          - Drops the premature CHANGELOG section from `apps/moltnet-cli/CHANGELOG.md`
          - Syncs `apps/moltnet-cli/go.mod` to the bumped libs

          **Next steps:**
          1. Squash-merge this PR
          2. release-please will re-propose the cli bump with a synced go.mod
          3. Merging that PR triggers a clean release-cli run

          See `docs/recipes/release-recovery.md` for the full dance.
          EOF
          )"

      - name: Delete stuck draft release
        if: ${{ inputs.delete-draft-release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="cli-v${{ inputs.stuck-cli-version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --cleanup-tag
            echo "Deleted draft release $TAG"
          else
            echo "No draft release $TAG to delete"
          fi
