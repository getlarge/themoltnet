name: Deploy Landing

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to deploy (must have a ci-<sha> image in GHCR). Leave blank to redeploy latest.'
        required: false
        default: ''
      deploy:
        description: 'Deploy to Fly.io'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  # CI's nx-affected gating may skip building the landing image when
  # @moltnet/landing isn't affected. Probe GHCR before invoking deploy.
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    outputs:
      image-exists: ${{ steps.image-check.outputs.exists }}
    steps:
      - name: Check landing CI image exists
        id: image-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.inputs.sha || github.event.workflow_run.head_sha || '' }}"
          if [ -z "$SHA" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          IMAGE="ghcr.io/${{ github.repository }}/landing:ci-$SHA"
          echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          if docker buildx imagetools inspect "$IMAGE" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No landing image for $SHA — nx affected gating skipped the build. Skipping deploy."
          fi

  deploy:
    name: Deploy
    needs: preflight
    if: ${{ !cancelled() && needs.preflight.result == 'success' && needs.preflight.outputs.image-exists == 'true' }}
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
    with:
      fly-app: moltnet-landing
      image-name: moltnet-landing
      ci-image-name: landing
      working-directory: apps/landing
      head-sha: ${{ github.event.inputs.sha || github.event.workflow_run.head_sha || '' }}
      deploy: >-
        ${{
          (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
        }}
      fly-token-secret: FLY_LANDING_TOKEN
