name: _deploy

on:
  workflow_call:
    inputs:
      fly-app:
        description: 'Fly.io app name'
        required: true
        type: string
      image-name:
        description: 'Production image name (under ghcr.io/<repo>/)'
        required: true
        type: string
      ci-image-name:
        description: 'CI image name (under ghcr.io/<repo>/), as built by CI'
        required: true
        type: string
      working-directory:
        description: 'Directory containing fly.toml'
        required: true
        type: string
      head-sha:
        description: 'Commit SHA to promote. Leave empty to redeploy current latest.'
        required: false
        default: ''
        type: string
      deploy:
        description: 'Whether to deploy to Fly.io'
        required: false
        default: true
        type: boolean
      fly-token-secret:
        description: 'Name of the secret in the production environment holding the Fly.io API token'
        required: false
        default: 'FLY_API_TOKEN'
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  # CI's nx-affected gating may skip building an image when the project
  # isn't affected by the diff. Probe GHCR first; if the ci-<sha> image
  # isn't there, skip the rest of the pipeline cleanly. workflow_dispatch
  # with an explicit SHA still surfaces a missing image as an error since
  # the caller explicitly asked for that deploy.
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      image-exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check CI image exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ inputs.head-sha }}
        run: |
          if [ -z "$SHA" ]; then
            # Empty SHA → caller wants :latest fallback. Promote handles it.
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          IMAGE="${REGISTRY}/${{ github.repository }}/${{ inputs.ci-image-name }}:ci-${SHA}"
          echo "Probing $IMAGE"
          echo "$GH_TOKEN" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
          if docker buildx imagetools inspect "$IMAGE" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No ci-<sha> image for ${{ inputs.ci-image-name }} at $SHA. CI's nx affected gating skipped the build because the project wasn't affected. Skipping deploy."
          fi

  promote:
    name: Promote CI image
    needs: preflight
    if: ${{ needs.preflight.outputs.image-exists == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.promote.outputs.image_ref }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Fly.io token
        uses: actions/github-script@v7
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          SECRET_NAME: ${{ inputs.fly-token-secret }}
        with:
          script: |
            const secrets = JSON.parse(process.env.ALL_SECRETS);
            const name = process.env.SECRET_NAME;
            if (!/^FLY_[A-Z0-9_]+_TOKEN$/.test(name)) core.setFailed(`Invalid secret name '${name}': must match FLY_*_TOKEN`);
            const value = secrets[name];
            if (!value) core.setFailed(`Secret '${name}' not found in production environment`);
            core.exportVariable('FLY_API_TOKEN', value);

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # v1.5

      - name: Log in to Fly.io registry
        run: flyctl auth docker

      - name: Promote image
        id: promote
        run: |
          REGISTRY="${{ env.REGISTRY }}"
          REPO="${{ github.repository }}"
          SHA="${{ inputs.head-sha }}"
          GHCR_IMAGE="${REGISTRY}/${REPO}/${{ inputs.image-name }}"
          FLY_IMAGE="registry.fly.io/${{ inputs.fly-app }}"

          if [ -n "$SHA" ]; then
            SOURCE="${REGISTRY}/${REPO}/${{ inputs.ci-image-name }}:ci-${SHA}"
            echo "Promoting CI image: $SOURCE"
            docker buildx imagetools create \
              --tag "${GHCR_IMAGE}:latest" \
              --tag "${GHCR_IMAGE}:${SHA}" \
              --tag "${FLY_IMAGE}:latest" \
              --tag "${FLY_IMAGE}:${SHA}" \
              "$SOURCE"
            echo "image_ref=${FLY_IMAGE}:${SHA}" >> "$GITHUB_OUTPUT"
          else
            SOURCE="${GHCR_IMAGE}:latest"
            echo "No SHA provided, falling back to: $SOURCE"
            if ! docker buildx imagetools inspect "$SOURCE" > /dev/null 2>&1; then
              echo "::error::Latest image not found: $SOURCE"
              echo "No prior successful deploy exists. Provide an explicit SHA or trigger via workflow_run."
              exit 1
            fi
            docker buildx imagetools create \
              --tag "${FLY_IMAGE}:latest" \
              "$SOURCE"
            echo "image_ref=${FLY_IMAGE}:latest" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy to Fly.io
    needs: [preflight, promote]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    if: ${{ inputs.deploy && needs.preflight.outputs.image-exists == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Fly.io token
        uses: actions/github-script@v7
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          SECRET_NAME: ${{ inputs.fly-token-secret }}
        with:
          script: |
            const secrets = JSON.parse(process.env.ALL_SECRETS);
            const name = process.env.SECRET_NAME;
            if (!/^FLY_[A-Z0-9_]+_TOKEN$/.test(name)) core.setFailed(`Invalid secret name '${name}': must match FLY_*_TOKEN`);
            const value = secrets[name];
            if (!value) core.setFailed(`Secret '${name}' not found in production environment`);
            core.exportVariable('FLY_API_TOKEN', value);

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # v1.5

      - name: Deploy
        working-directory: ${{ inputs.working-directory }}
        run: |
          IMAGE_REF="${{ needs.promote.outputs.image_ref }}"
          if [ -z "$IMAGE_REF" ]; then
            echo "::error::image_ref output from promote job is empty"
            exit 1
          fi
          flyctl deploy --image "$IMAGE_REF"
