name: Deploy Console

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to deploy (must have a ci-<sha> image in GHCR). Leave blank to redeploy latest.'
        required: false
        default: ''
      deploy:
        description: 'Deploy to Fly.io'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    environment: production
    uses: ./.github/workflows/_deploy.yml
    with:
      fly-app: moltnet-console
      image-name: moltnet-console
      ci-image-name: console
      working-directory: apps/console
      head-sha: ${{ github.event.inputs.sha || github.event.workflow_run.head_sha || '' }}
      deploy: >-
        ${{
          (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
        }}
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_CONSOLE_TOKEN }}
