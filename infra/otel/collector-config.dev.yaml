# OpenTelemetry Collector configuration for local development.
#
# Two OTLP receivers:
#
#   - otlp (4317 gRPC / 4318 HTTP) — UNAUTHENTICATED, for internal service-
#     mesh traffic (rest-api, mcp-server, etc.). Reachable only within the
#     docker network; host-side port bindings are a dev convenience.
#
#   - otlp/public (4319 HTTP) — AUTHENTICATED via the `oryintrospectionauth`
#     extension. This is the endpoint that agent workers (work-task,
#     hosted runners) use. Tokens are validated against local Hydra's
#     `/admin/oauth2/introspect`.
#
# Exports to debug (stdout) so telemetry is visible without cloud creds.

extensions:
  health_check:
    endpoint: '0.0.0.0:13133'

  # Gates the public OTLP receiver. For local dev we point at local Hydra
  # admin on port 4445 and don't require additional auth on the
  # introspection call itself (`type: none`) — local Hydra admin is
  # network-isolated inside docker-compose.
  oryintrospectionauth:
    introspection_endpoint: 'http://hydra:4445/admin/oauth2/introspect'
    introspection_auth:
      type: 'none'
    required_scopes: ['telemetry:write']
    cache_ttl: 30s

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: '0.0.0.0:4317'
      http:
        endpoint: '0.0.0.0:4318'

  otlp/public:
    protocols:
      http:
        endpoint: '0.0.0.0:4319'
        auth:
          authenticator: oryintrospectionauth

processors:
  batch:
    timeout: 2s
    send_batch_size: 256

  resource:
    attributes:
      - key: service.namespace
        value: moltnet
        action: upsert
      - key: deployment.environment
        value: development
        action: upsert

  # Redact sensitive values from telemetry (mirrors production config).
  transform/redact:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - replace_pattern(attributes["http.request.header.authorization"], ".*", "[REDACTED]")
          - replace_pattern(attributes["http.request.header.cookie"], ".*", "[REDACTED]")
          - replace_pattern(attributes["http.request.header.x-api-key"], ".*", "[REDACTED]")
          - replace_pattern(attributes["http.request.header.x-ory-api-key"], ".*", "[REDACTED]")
          - replace_pattern(attributes["http.response.header.set-cookie"], ".*", "[REDACTED]")
          - replace_pattern(attributes["password"], ".*", "[REDACTED]")
          - replace_pattern(attributes["token"], ".*", "[REDACTED]")
          - replace_pattern(attributes["secret"], ".*", "[REDACTED]")
          - replace_pattern(attributes["api_key"], ".*", "[REDACTED]")
          - replace_pattern(attributes["private_key"], ".*", "[REDACTED]")
          - replace_pattern(attributes["ory.recovery_codes"], ".*", "[REDACTED]")
          - replace_pattern(attributes["ory.credentials"], ".*", "[REDACTED]")
    log_statements:
      - context: log
        statements:
          - replace_pattern(attributes["http.request.header.authorization"], ".*", "[REDACTED]")
          - replace_pattern(attributes["http.request.header.cookie"], ".*", "[REDACTED]")
          - replace_pattern(attributes["http.request.header.x-api-key"], ".*", "[REDACTED]")
          - replace_pattern(attributes["http.request.header.x-ory-api-key"], ".*", "[REDACTED]")
          - replace_pattern(attributes["password"], ".*", "[REDACTED]")
          - replace_pattern(attributes["token"], ".*", "[REDACTED]")
          - replace_pattern(attributes["secret"], ".*", "[REDACTED]")
          - replace_pattern(attributes["api_key"], ".*", "[REDACTED]")
          - replace_pattern(attributes["private_key"], ".*", "[REDACTED]")

exporters:
  debug:
    verbosity: detailed

service:
  extensions: [health_check, oryintrospectionauth]

  pipelines:
    # Internal pipeline — unauthenticated receiver, full processing chain.
    traces:
      receivers: [otlp]
      processors: [transform/redact, resource, batch]
      exporters: [debug]

    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]

    logs:
      receivers: [otlp]
      processors: [transform/redact, resource, batch]
      exporters: [debug]

    # Public pipeline — authenticated receiver. Shares processors with
    # internal (redaction, namespace tagging) but reads from the gated
    # receiver only. Keeping this as a separate pipeline makes the
    # authenticated surface explicit in the config and allows divergent
    # processing later (rate limiting, attribution enforcement) without
    # entangling internal traffic.
    traces/public:
      receivers: [otlp/public]
      processors: [transform/redact, resource, batch]
      exporters: [debug]

  telemetry:
    logs:
      level: debug
