# Local-only Ory Talos OSS configuration.
# Production uses a managed or separately hardened Talos deployment.

serve:
  http:
    host: 0.0.0.0
    port: 4420
    request_log:
      exclude_health_endpoints: true
  metrics:
    host: 0.0.0.0
    port: 4422

credentials:
  issuer: http://localhost:4420
  api_keys:
    # Bearer keys are deliberately short until MoltNet ships rotation/revocation
    # management. Issuance may request less, never more than seven days.
    default_ttl: 24h
    max_ttl: 168h
    prefix:
      current: ory_ak
      retired: []
  derived_tokens:
    default_ttl: 5m
    jwt:
      signing_keys:
        urls:
          # Overridden at startup with a runtime-generated base64:// JWKS URL.
          - base64://runtime-generated-by-docker-compose
    macaroon:
      prefix:
        current: mc
        retired: []

db:
  dsn: sqlite3:///var/lib/talos/talos.db?_journal_mode=WAL

log:
  level: info
  format: json

tracing:
  enabled: false

cache:
  # Local/e2e favors deterministic revocation over throughput. MoltNet's auth
  # verifier also sends Cache-Control: no-store on every decision.
  type: noop
  ttl: 5m

multitenancy:
  enabled: false
