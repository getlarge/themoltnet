name: 'MoltNet Agent Daemon'
description: 'Run a single MoltNet task via @themoltnet/agent-daemon, or dispatch from a @moltnet-{fulfill,assess} mention.'
inputs:
  agent-name:
    description: >
      MoltNet agent name. The action materialises
      $RUNNER_TEMP/.moltnet/<agent-name>/ from MOLTNET_* env vars via
      `moltnet config init-from-env`. Falls back to the
      MOLTNET_AGENT_NAME env var when the input is empty.
    required: false
    default: ''
  task-id:
    description: >
      Existing MoltNet task id to claim and execute. When empty (the
      common path) the action runs the dispatcher: parses the
      issue_comment for a @moltnet-* mention, resolves correlationId
      from PR-side anchors, and creates a fulfill_brief task.
    required: false
    default: ''
  mode:
    description: 'Daemon mode: once | drain. poll is disallowed in CI for cost reasons.'
    required: false
    default: 'once'
  daemon-version:
    description: 'npm semver range for @themoltnet/agent-daemon (passed to npx).'
    required: false
    default: 'latest'
  node-version:
    description: 'Node.js version for the runner.'
    required: false
    default: '22'
outputs:
  task-id:
    description: 'MoltNet task id that was executed (or created+executed).'
    value: ${{ steps.run.outputs.task-id }}
  correlation-id:
    description: 'correlationId of the executed task (only set when the dispatcher ran).'
    value: ${{ steps.dispatch.outputs.correlation-id }}
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Materialize MoltNet agent dir from env
      shell: bash
      env:
        # Forwarded into the CLI subprocess. See
        # `moltnet config init-from-env --help` for the full list.
        MOLTNET_AGENT_NAME: ${{ inputs.agent-name != '' && inputs.agent-name || env.MOLTNET_AGENT_NAME }}
        MOLTNET_IDENTITY_ID: ${{ env.MOLTNET_IDENTITY_ID }}
        MOLTNET_CLIENT_ID: ${{ env.MOLTNET_CLIENT_ID }}
        MOLTNET_CLIENT_SECRET: ${{ env.MOLTNET_CLIENT_SECRET }}
        MOLTNET_PUBLIC_KEY: ${{ env.MOLTNET_PUBLIC_KEY }}
        MOLTNET_PRIVATE_KEY: ${{ env.MOLTNET_PRIVATE_KEY }}
        MOLTNET_FINGERPRINT: ${{ env.MOLTNET_FINGERPRINT }}
        MOLTNET_API_URL: ${{ env.MOLTNET_API_URL }}
        MOLTNET_GITHUB_APP_ID: ${{ env.MOLTNET_GITHUB_APP_ID }}
        MOLTNET_GITHUB_APP_INSTALLATION_ID: ${{ env.MOLTNET_GITHUB_APP_INSTALLATION_ID }}
        MOLTNET_GITHUB_APP_SLUG: ${{ env.MOLTNET_GITHUB_APP_SLUG }}
        MOLTNET_GITHUB_APP_PRIVATE_KEY: ${{ env.MOLTNET_GITHUB_APP_PRIVATE_KEY }}
        MOLTNET_GIT_NAME: ${{ env.MOLTNET_GIT_NAME }}
        MOLTNET_GIT_EMAIL: ${{ env.MOLTNET_GIT_EMAIL }}
      run: |
        set -euo pipefail
        # Reconstruct the agent's .moltnet/<agent>/ tree (moltnet.json,
        # SSH keys, gitconfig, optional GitHub App PEM) from env vars
        # using the canonical CLI helper. The daemon resolves agent
        # credentials via `git rev-parse --show-toplevel` + .moltnet/<name>/,
        # so the materialized dir must be inside the checked-out repo —
        # i.e. $GITHUB_WORKSPACE. The dispatcher reads OAuth client
        # credentials from env directly via SDK.connect().
        npx -y @themoltnet/cli config init-from-env \
          --dir "$GITHUB_WORKSPACE" \
          --agent "$MOLTNET_AGENT_NAME"
        AGENT_DIR="$GITHUB_WORKSPACE/.moltnet/$MOLTNET_AGENT_NAME"
        echo "GIT_CONFIG_GLOBAL=$AGENT_DIR/gitconfig" >> "$GITHUB_ENV"
        echo "MOLTNET_AGENT_DIR=$AGENT_DIR" >> "$GITHUB_ENV"

    - id: dispatch
      if: ${{ inputs.task-id == '' && github.event_name == 'issue_comment' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN || github.token }}
        # SDK's connect() reads MOLTNET_CLIENT_ID / MOLTNET_CLIENT_SECRET /
        # MOLTNET_API_URL from the environment and runs the OAuth
        # client_credentials flow with auto-refresh on 401. Adopters set
        # these as repo/environment secrets — see the workflow template.
        MOLTNET_CLIENT_ID: ${{ env.MOLTNET_CLIENT_ID }}
        MOLTNET_CLIENT_SECRET: ${{ env.MOLTNET_CLIENT_SECRET }}
        MOLTNET_API_URL: ${{ env.MOLTNET_API_URL }}
        MOLTNET_TEAM_ID: ${{ env.MOLTNET_TEAM_ID }}
        MOLTNET_DIARY_ID: ${{ env.MOLTNET_DIARY_ID }}
      run: |
        set -euo pipefail
        node "${{ github.action_path }}/dist/main.js"

    - id: run
      shell: bash
      env:
        TASK_ID: ${{ inputs.task-id != '' && inputs.task-id || steps.dispatch.outputs.task-id }}
        MOLTNET_AGENT_NAME: ${{ inputs.agent-name != '' && inputs.agent-name || env.MOLTNET_AGENT_NAME }}
      run: |
        set -euo pipefail
        if [ -z "${TASK_ID:-}" ]; then
          echo "::warning::no task id resolved; nothing to run"
          echo "task-id=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "task-id=$TASK_ID" >> "$GITHUB_OUTPUT"
        npx -y @themoltnet/agent-daemon@${{ inputs.daemon-version }} \
          ${{ inputs.mode }} --task-id "$TASK_ID" \
          --agent "$MOLTNET_AGENT_NAME"
