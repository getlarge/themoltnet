name: 'MoltNet Agent Daemon'
description: 'Run a single MoltNet task via @themoltnet/agent-daemon, or dispatch from a @moltnet-{fulfill,assess} mention.'
inputs:
  agent-name:
    description: >
      MoltNet agent name. The action materialises
      $GITHUB_WORKSPACE/.moltnet/<agent-name>/ from MOLTNET_* env vars
      via `moltnet config init-from-env`. When empty, the action falls
      back to the MOLTNET_AGENT_NAME env var the caller set on the
      step.
    required: false
    default: ''
  task-id:
    description: >
      Existing MoltNet task id to claim and execute. When empty (the
      common path) the action runs the dispatcher: parses the
      issue_comment for a @moltnet-* mention, resolves correlationId
      from PR-side anchors, and creates a fulfill_brief task.
    required: false
    default: ''
  mode:
    description: 'Daemon mode: once | drain. poll is disallowed in CI for cost reasons.'
    required: false
    default: 'once'
  provider:
    description: >
      LLM provider key (e.g. `anthropic`, `openai`, `bedrock`).
      Forwarded to `agent-daemon --provider`. No default — operator-specific
      and silently misconfigures on any other machine, so the daemon refuses
      to start without it. Falls back to the MOLTNET_AGENT_PROVIDER env var
      when this input is empty.
    required: false
    default: ''
  model:
    description: >
      Model id understood by the chosen provider (e.g. `claude-sonnet-4-5`,
      `gpt-4o-mini`). Forwarded to `agent-daemon --model`. Falls back to the
      MOLTNET_AGENT_MODEL env var when this input is empty.
    required: false
    default: ''
  daemon-version:
    description: 'npm semver range for @themoltnet/agent-daemon (passed to npx).'
    required: false
    default: 'latest'
  node-version:
    description: >
      Node.js version for the runner. Default is 24 because the
      gondolin sandbox (`@earendil-works/gondolin`) requires Node
      >=23.6, and 24 is the LTS sibling. Earlier versions emit
      `EBADENGINE` warnings and may exhibit runtime failures inside
      the sandbox boot path.
    required: false
    default: '24'
outputs:
  task-id:
    description: 'MoltNet task id that was executed (or created+executed).'
    value: ${{ steps.run.outputs.task-id }}
  correlation-id:
    description: 'correlationId of the executed task (only set when the dispatcher ran).'
    value: ${{ steps.dispatch.outputs.correlation-id }}
runs:
  using: 'composite'
  # The composite handler in actions/runner propagates the caller-step's
  # `env:` block into each child step's expression env context AND into
  # the spawned shell's process environment (see CompositeActionHandler.cs
  # > "Merge global env"). Adopters declare the MOLTNET_* set
  # (CLIENT_ID, CLIENT_SECRET, PUBLIC_KEY, PRIVATE_KEY, FINGERPRINT,
  # IDENTITY_ID, AGENT_NAME, API_URL, TEAM_ID, DIARY_ID, optional
  # GITHUB_APP_*, GIT_NAME, GIT_EMAIL) on the step that calls this
  # action — every shell below sees them via process.env without having
  # to re-list each one in a child `env:` block.
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    # Cache the resolved .deb files so warm runs skip the ~90s download.
    # We use the **explicit restore + save** pattern (not the combined
    # `actions/cache@v4`) because the auto post-step the combined form
    # registers does not run reliably from inside a composite action
    # when the parent step exits non-zero — we observed the post-job
    # save being skipped on the very first failed smoke test, leaving
    # the cache empty for every subsequent run. Splitting into
    # `restore` (front) + `save` (back, with `if: always() && miss`)
    # forces both halves to execute as ordinary composite steps.
    # Bump the `-v<N>-` segment if the package list below changes so
    # we don't restore stale debs.
    - name: Compute apt cache key
      if: runner.os == 'Linux'
      id: apt-cache-key
      shell: bash
      run: |
        echo "value=${{ runner.os }}-${{ runner.arch }}-apt-gondolin-v1-qemu-utils-qemu-system-x86" >> "$GITHUB_OUTPUT"

    - name: Restore apt archives cache (gondolin deps)
      if: runner.os == 'Linux'
      id: restore-apt-cache
      uses: actions/cache/restore@v4
      with:
        path: ~/.cache/agent-daemon-action/apt
        key: ${{ steps.apt-cache-key.outputs.value }}

    - name: Install gondolin sandbox dependencies
      shell: bash
      env:
        APT_CACHE_HIT: ${{ steps.restore-apt-cache.outputs.cache-hit }}
      run: |
        set -euo pipefail
        # The agent-daemon spawns each task inside a gondolin micro-VM
        # (`@earendil-works/gondolin`), which shells out to:
        #   - `qemu-img`           (from the qemu-utils package) for
        #     creating the qcow2 overlay
        #   - `qemu-system-x86_64` (from the qemu-system-x86 package)
        #     for booting the guest
        # Standard `ubuntu-latest` runners ship neither — without this
        # step the daemon fails at sandbox setup with
        # `spawnSync qemu-img ENOENT` before the LLM is ever called.
        # /dev/kvm is unavailable on standard GitHub-hosted runners
        # (no nested virt). Gondolin auto-falls-back to TCG software
        # emulation in that case (slower boot, ~1-3 min, but works
        # without elevated privileges).
        # Skip cleanly on non-Linux runners — gondolin uses HVF on
        # macOS via `brew install qemu`, which adopters running
        # `runs-on: macos-*` need to install themselves.
        case "$(uname -s)" in
          Linux)
            if command -v qemu-img >/dev/null && command -v qemu-system-x86_64 >/dev/null; then
              echo "::notice::qemu already present; skipping install"
              exit 0
            fi
            CACHE_DIR="$HOME/.cache/agent-daemon-action/apt"
            mkdir -p "$CACHE_DIR"
            # Always update the package index — it's small (~1s) and
            # required for `apt-get install` to resolve names even when
            # the .debs themselves are cached.
            sudo apt-get update -qq
            if [ "${APT_CACHE_HIT:-}" = "true" ] && [ -n "$(ls -A "$CACHE_DIR" 2>/dev/null || true)" ]; then
              echo "::notice::apt cache hit; installing $(ls "$CACHE_DIR" | wc -l) debs from $CACHE_DIR"
              # Stage cached .debs where apt expects them, then install
              # with --no-download so any missing dep fails loud rather
              # than silently fetching it.
              sudo cp "$CACHE_DIR"/*.deb /var/cache/apt/archives/
              if sudo apt-get install -y --no-install-recommends --no-download \
                  qemu-utils qemu-system-x86; then
                exit 0
              fi
              echo "::warning::cache hit but --no-download install failed; falling through to fresh install"
            fi
            # Cold path or cache miss: download + install, then stage
            # the resolved .debs into the runner-writable cache dir.
            # The `Save apt archives cache` step below uploads them.
            sudo apt-get install -y --no-install-recommends \
              qemu-utils qemu-system-x86
            shopt -s nullglob
            count=0
            for deb in /var/cache/apt/archives/*.deb; do
              sudo cp "$deb" "$CACHE_DIR/"
              count=$((count + 1))
            done
            sudo chown -R "$(id -u):$(id -g)" "$CACHE_DIR"
            echo "::notice::staged $count debs for next run's cache"
            ;;
          *)
            echo "::warning::Non-Linux runner detected ($(uname -s)). Install qemu manually if you intend to run the gondolin sandbox here."
            ;;
        esac

    # Explicit save — runs as a normal composite step (not a post-job
    # hook), so it executes even if a later step fails. We only save
    # on cache miss to avoid re-uploading an unchanged blob.
    - name: Save apt archives cache (gondolin deps)
      if: runner.os == 'Linux' && steps.restore-apt-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ~/.cache/agent-daemon-action/apt
        key: ${{ steps.apt-cache-key.outputs.value }}

    - name: Materialize MoltNet agent dir from env
      shell: bash
      env:
        # Only the input override is forwarded explicitly — caller-env
        # inheritance handles the rest. When inputs.agent-name is unset,
        # the script falls through to the inherited MOLTNET_AGENT_NAME.
        AGENT_NAME_OVERRIDE: ${{ inputs.agent-name }}
      run: |
        set -euo pipefail
        if [ -n "${AGENT_NAME_OVERRIDE:-}" ]; then
          export MOLTNET_AGENT_NAME="$AGENT_NAME_OVERRIDE"
        elif [ -z "${MOLTNET_AGENT_NAME:-}" ]; then
          echo "::error::MOLTNET_AGENT_NAME is required (set as env on the caller step or pass agent-name input)" >&2
          exit 1
        fi
        # Reconstruct the agent's .moltnet/<agent>/ tree (moltnet.json,
        # SSH keys, gitconfig, optional GitHub App PEM) from the
        # caller-supplied MOLTNET_* env vars using the canonical CLI
        # helper. The daemon resolves agent credentials via
        # `git rev-parse --show-toplevel` + .moltnet/<name>/, so the
        # materialized dir must be inside the checked-out repo —
        # i.e. $GITHUB_WORKSPACE. The dispatcher reads OAuth client
        # credentials from env directly via SDK.connect().
        npx -y @themoltnet/cli config init-from-env \
          --dir "$GITHUB_WORKSPACE" \
          --agent "$MOLTNET_AGENT_NAME"
        AGENT_DIR="$GITHUB_WORKSPACE/.moltnet/$MOLTNET_AGENT_NAME"
        {
          echo "GIT_CONFIG_GLOBAL=$AGENT_DIR/gitconfig"
          echo "MOLTNET_AGENT_DIR=$AGENT_DIR"
          echo "MOLTNET_AGENT_NAME=$MOLTNET_AGENT_NAME"
        } >> "$GITHUB_ENV"

    - name: Materialize Pi auth.json (when PI_AUTH_JSON is set)
      shell: bash
      run: |
        set -euo pipefail
        # When the caller exports PI_AUTH_JSON (the contents of an
        # `~/.pi/agent/auth.json` produced by `pi /login` against
        # subscription providers — Anthropic Pro/Max, ChatGPT
        # Plus/Pro Codex, GitHub Copilot), write it to a runner-local
        # path and point pi-extension at it via PI_AUTH_PATH.
        #
        # If PI_AUTH_JSON is absent the daemon falls back to env-var
        # providers (ANTHROPIC_API_KEY etc.) which Pi reads natively.
        #
        # Refresh / re-seed: Pi rotates the OAuth tokens on each run
        # but this action does not write the rotated file back.
        # Subscription tokens age out within Pi's refresh window
        # (~30 days for ChatGPT Codex per the OpenAI CI/CD doc).
        # When that happens, re-run `pi /login` locally and re-upload
        # the secret. See:
        # https://developers.openai.com/codex/auth/ci-cd-auth#what-to-do-when-refresh-stops-working
        if [ -n "${PI_AUTH_JSON:-}" ]; then
          PI_AUTH_PATH="$RUNNER_TEMP/.pi/agent/auth.json"
          mkdir -p "$(dirname "$PI_AUTH_PATH")"
          printf '%s' "$PI_AUTH_JSON" > "$PI_AUTH_PATH"
          chmod 600 "$PI_AUTH_PATH"
          echo "PI_AUTH_PATH=$PI_AUTH_PATH" >> "$GITHUB_ENV"
          echo "::notice::Pi auth.json materialized at \$PI_AUTH_PATH"

          # Best-effort staleness check (#1040). Pi writes per-provider
          # entries with shape:
          #   { "<provider>": { "type": "oauth", "expires": <ms-epoch>, ... } }
          # `expires` is the *access* token TTL (Pi rotates it on each
          # run), so its absolute value isn't the refresh-window edge —
          # but because this action does NOT write rotated tokens back
          # to the secret, `expires` falling into the past is a strong
          # signal that the secret has been frozen long enough that the
          # opaque ~30-day refresh window is at risk. Treated as:
          #   - any provider expires < now      → ::warning::
          #   - any provider expires < now-30d  → ::error:: (still
          #     proceed; the daemon will surface the real 401 if the
          #     refresh genuinely failed, and we don't want this check
          #     to block recovery flows that happen to pass a fresh
          #     bundle inline)
          # If jq isn't available or the JSON shape doesn't match,
          # silently skip — never fail the workflow on this heuristic.
          if command -v jq >/dev/null 2>&1; then
            now_ms=$(($(date +%s) * 1000))
            grace_ms=$(( 30 * 86400 * 1000 ))
            min_expires=$(jq -r '
              [.[] | select(type == "object" and .expires != null) | .expires]
              | if length == 0 then empty else min end
            ' "$PI_AUTH_PATH" 2>/dev/null || true)
            if [ -n "${min_expires:-}" ] && [ "$min_expires" -gt 0 ] 2>/dev/null; then
              if [ "$min_expires" -lt $(( now_ms - grace_ms )) ]; then
                days_past=$(( (now_ms - min_expires) / 86400000 ))
                echo "::error::PI_AUTH_JSON access token expired ${days_past} days ago — Pi's refresh window has almost certainly elapsed. Re-run \`pi /login\` and re-upload the secret. See https://developers.openai.com/codex/auth/ci-cd-auth#what-to-do-when-refresh-stops-working"
              elif [ "$min_expires" -lt "$now_ms" ]; then
                hours_past=$(( (now_ms - min_expires) / 3600000 ))
                echo "::warning::PI_AUTH_JSON access token expired ${hours_past}h ago. Pi will try to refresh, but if you see a 401, re-run \`pi /login\` and re-upload the secret."
              fi
            fi
          fi
        else
          echo "::notice::PI_AUTH_JSON not set; Pi will use env-var providers"
        fi

    - id: dispatch
      if: ${{ inputs.task-id == '' && github.event_name == 'issue_comment' }}
      shell: bash
      run: |
        set -euo pipefail
        # MOLTNET_CLIENT_ID / MOLTNET_CLIENT_SECRET / MOLTNET_API_URL /
        # MOLTNET_TEAM_ID / MOLTNET_DIARY_ID / GITHUB_TOKEN are inherited
        # from the caller step's env. SDK's connect() reads the OAuth
        # vars directly from process.env; the dispatch script reads
        # TEAM_ID / DIARY_ID via process.env too.
        node "${{ github.action_path }}/dist/main.js"

    - id: run
      shell: bash
      env:
        TASK_ID: ${{ inputs.task-id != '' && inputs.task-id || steps.dispatch.outputs.task-id }}
        PROVIDER_OVERRIDE: ${{ inputs.provider }}
        MODEL_OVERRIDE: ${{ inputs.model }}
      run: |
        set -euo pipefail
        if [ -z "${TASK_ID:-}" ]; then
          echo "::warning::no task id resolved; nothing to run"
          echo "task-id=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        # Resolve provider/model: prefer explicit input, fall back to
        # MOLTNET_AGENT_PROVIDER / MOLTNET_AGENT_MODEL inherited from
        # the caller step's env. The daemon refuses to start when either
        # is missing — fail fast here with a clear error instead of
        # letting it surface through npx.
        PROVIDER="${PROVIDER_OVERRIDE:-${MOLTNET_AGENT_PROVIDER:-}}"
        MODEL="${MODEL_OVERRIDE:-${MOLTNET_AGENT_MODEL:-}}"
        if [ -z "$PROVIDER" ]; then
          echo "::error::provider is required (set the action's \`provider\` input or MOLTNET_AGENT_PROVIDER env)" >&2
          exit 1
        fi
        if [ -z "$MODEL" ]; then
          echo "::error::model is required (set the action's \`model\` input or MOLTNET_AGENT_MODEL env)" >&2
          exit 1
        fi
        echo "task-id=$TASK_ID" >> "$GITHUB_OUTPUT"
        npx -y @themoltnet/agent-daemon@${{ inputs.daemon-version }} \
          ${{ inputs.mode }} --task-id "$TASK_ID" \
          --agent "$MOLTNET_AGENT_NAME" \
          --provider "$PROVIDER" \
          --model "$MODEL"
