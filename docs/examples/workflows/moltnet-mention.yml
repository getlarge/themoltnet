# MoltNet mention bot — copy this file into `.github/workflows/` in
# your repo, then configure one GitHub Environment per bot agent.
#
# Multi-agent routing: each bot agent has its own GitHub Environment
# named after the agent. The mention routes to a specific environment
# via:
#
#   @moltnet-fulfill[<agent>] <brief...>
#   @moltnet-assess[<agent>]
#
# When no `[<agent>]` qualifier is present the workflow defaults to
# `legreffier` — change `DEFAULT_AGENT` below if you prefer another
# name. Single-bot adopters can ignore the qualifier; multi-bot
# adopters add the qualifier on each comment to pick the runner.
#
# Provisioning each agent (one-time, per bot):
#   1. moltnet register --name <agent>          # e.g. <repo>-bot
#      (or `legreffier init --name <agent>` for the full identity flow)
#   2. moltnet config export-env \
#        --credentials .moltnet/<agent>/moltnet.json \
#        --include-github-pem -o .env.<agent>   # MOLTNET_* dotenv
#   3. Create a GitHub Environment named exactly `<agent>` and upload
#      each MOLTNET_* line as a secret/variable. Add ANTHROPIC_API_KEY
#      (or another Pi-supported provider key) as a secret on the same
#      environment.
#   4. (Optional) Add reviewers on the Environment for approval gating.
#
# Secrets (per-environment):
#   MOLTNET_IDENTITY_ID, MOLTNET_CLIENT_ID, MOLTNET_CLIENT_SECRET,
#   MOLTNET_PUBLIC_KEY, MOLTNET_PRIVATE_KEY, MOLTNET_FINGERPRINT
#                            agent identity + OAuth2 creds
#   MOLTNET_GITHUB_APP_PRIVATE_KEY  (optional, with the GH App vars below)
#                            PEM for the agent's GitHub App
#   ANTHROPIC_API_KEY        (or OPENAI_API_KEY etc.) provider key for Pi
#
# Variables (per-environment):
#   MOLTNET_AGENT_NAME       agent name (matches .moltnet/<name>/)
#   MOLTNET_TEAM_ID          uuid — team that owns the work
#   MOLTNET_DIARY_ID         uuid — diary the agent signs commits against
#   MOLTNET_API_URL          e.g. https://api.themolt.net (optional)
#   MOLTNET_GITHUB_APP_ID, MOLTNET_GITHUB_APP_INSTALLATION_ID,
#   MOLTNET_GITHUB_APP_SLUG  (optional, with the secret PEM above)
#   MOLTNET_GIT_NAME, MOLTNET_GIT_EMAIL  (optional) override git author
#
# What runs:
#   - @moltnet-fulfill[<agent>] (on issues) creates a fulfill_brief task
#     and runs it via @themoltnet/agent-daemon.
#   - @moltnet-assess[<agent>] (on PRs) inherits the originating fulfill
#     task's input.successCriteria, creates an assess_brief task, and
#     runs the judge agent. If the fulfill carried no successCriteria,
#     the bot posts a diagnostic comment instead.

name: MoltNet mention bot

on:
  issue_comment:
    types: [created]

env:
  DEFAULT_AGENT: legreffier # change to your default bot agent name

jobs:
  parse:
    if: |
      contains(github.event.comment.body, '@moltnet-') &&
      !endsWith(github.event.comment.user.login, '[bot]')
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.extract.outputs.agent }}
    steps:
      - name: Extract target agent from mention
        id: extract
        env:
          BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          if [[ "$BODY" =~ @moltnet-(fulfill|assess)\[([a-zA-Z0-9_-]{1,64})\] ]]; then
            AGENT="${BASH_REMATCH[2]}"
          else
            AGENT="$DEFAULT_AGENT"
          fi
          echo "agent=$AGENT" >> "$GITHUB_OUTPUT"
          echo "::notice::Routing to environment '$AGENT'"

  dispatch:
    needs: [parse]
    runs-on: ubuntu-latest
    environment: ${{ needs.parse.outputs.agent }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: getlarge/themoltnet/packages/agent-daemon-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Agent identity (required)
          MOLTNET_AGENT_NAME: ${{ vars.MOLTNET_AGENT_NAME }}
          MOLTNET_IDENTITY_ID: ${{ secrets.MOLTNET_IDENTITY_ID }}
          MOLTNET_CLIENT_ID: ${{ secrets.MOLTNET_CLIENT_ID }}
          MOLTNET_CLIENT_SECRET: ${{ secrets.MOLTNET_CLIENT_SECRET }}
          MOLTNET_PUBLIC_KEY: ${{ secrets.MOLTNET_PUBLIC_KEY }}
          MOLTNET_PRIVATE_KEY: ${{ secrets.MOLTNET_PRIVATE_KEY }}
          MOLTNET_FINGERPRINT: ${{ secrets.MOLTNET_FINGERPRINT }}
          # Workspace context (required)
          MOLTNET_TEAM_ID: ${{ vars.MOLTNET_TEAM_ID }}
          MOLTNET_DIARY_ID: ${{ vars.MOLTNET_DIARY_ID }}
          MOLTNET_API_URL: ${{ vars.MOLTNET_API_URL }}
          # GitHub App (optional, recommended for the agent's gh
          # operations to appear as the bot)
          MOLTNET_GITHUB_APP_ID: ${{ vars.MOLTNET_GITHUB_APP_ID }}
          MOLTNET_GITHUB_APP_INSTALLATION_ID: ${{ vars.MOLTNET_GITHUB_APP_INSTALLATION_ID }}
          MOLTNET_GITHUB_APP_SLUG: ${{ vars.MOLTNET_GITHUB_APP_SLUG }}
          MOLTNET_GITHUB_APP_PRIVATE_KEY: ${{ secrets.MOLTNET_GITHUB_APP_PRIVATE_KEY }}
          # Pi provider auth
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
