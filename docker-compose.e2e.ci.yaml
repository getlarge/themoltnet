# MoltNet Docker Compose — E2E CI Override
#
# Since #1498, docker-compose.e2e.yaml is already image-based (no build: blocks
# for repo-built services) and reads the same *_IMAGE env vars this file does, so
# this override is largely redundant. It is kept as the explicit CI image-pinning
# layer: CI sets REST_API_IMAGE/MCP_SERVER_IMAGE/DB_MIGRATE_IMAGE/CONSOLE_IMAGE/
# MCP_HOST_IMAGE to the ci-${sha} GHCR tags, and applying this file documents the
# intent at the compose layer. If a base service ever regains a build: block,
# add `build: !reset null` here to force the pre-built image.
#
# Usage:
#   docker compose -f docker-compose.e2e.yaml -f docker-compose.e2e.ci.yaml up -d
#
# Required env vars (set by CI):
#   REST_API_IMAGE, MCP_SERVER_IMAGE, DB_MIGRATE_IMAGE, CONSOLE_IMAGE, MCP_HOST_IMAGE

services:
  app-db-migrate:
    image: ${DB_MIGRATE_IMAGE:-ghcr.io/getlarge/themoltnet/db-migrate:dev}

  rest-api:
    image: ${REST_API_IMAGE:-ghcr.io/getlarge/themoltnet/rest-api:dev}

  mcp-server:
    image: ${MCP_SERVER_IMAGE:-ghcr.io/getlarge/themoltnet/mcp-server:dev}

  console:
    image: ${CONSOLE_IMAGE:-ghcr.io/getlarge/themoltnet/console:dev}

  mcp-host:
    image: ${MCP_HOST_IMAGE:-ghcr.io/getlarge/themoltnet/mcp-host:dev}
